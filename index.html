<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚖️ SE-05 Case Law Hub</title>
<style>
  :root{--bg:#0a0f1d;--card:#151e32;--text:#e6edf3;--muted:#8b9bb4;--primary:#3b82f6;--accent:#06b6d4;--border:#24324a;--radius:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:16px}
  header{background:linear-gradient(135deg,#1e3a8a,#0f172a);padding:20px;border-radius:var(--radius);margin-bottom:20px;text-align:center}
  h1{font-size:1.8rem;margin-bottom:8px}
  .sub{color:var(--muted);font-size:.9rem}
  #search{width:100%;max-width:600px;margin:12px auto;display:block;padding:12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1rem}
  #filters{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:10px 0}
  .fb{padding:5px 12px;border-radius:18px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.8rem;transition:.2s}
  .fb.act{background:var(--primary);border-color:var(--primary)}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;max-width:1200px;margin:0 auto}
  .c{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:.2s}
  .c:hover{transform:translateY(-2px);border-color:var(--accent)}
  .st{display:inline-block;background:var(--primary);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:12px;margin-bottom:6px}
  .cn{font-weight:700;font-size:1rem;margin-bottom:4px}
  .cc{color:var(--muted);font-size:.75rem;margin-bottom:5px}
  .cb{font-size:.85rem}
  .m{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:12px}
  .mc{background:var(--card);width:100%;max-width:800px;max-height:90vh;overflow-y:auto;padding:20px;border-radius:var(--radius);position:relative}
  .cl{position:absolute;top:10px;right:15px;font-size:1.8rem;cursor:pointer;color:var(--muted)}
  .ds{margin-bottom:12px}
  .dl{color:var(--accent);font-weight:600;margin-bottom:3px;display:block}
  .dv{white-space:pre-wrap}
</style>
</head>
<body>
<header>
  <h1>⚖️ SE-05 Case Law Hub</h1>
  <p class="sub">भूटान न्यायाधीश प्रशिक्षण • नवंबर 2024</p>
</header>
<input type="text" id="search" placeholder="🔍 केस नाम, संदर्भ या कीवर्ड खोजें...">
<div id="filters">
  <button class="fb act" data-s="all">सभी</button>
  <button class="fb" data-s="S2">न्यायिक आचार</button>
  <button class="fb" data-s="S3">निर्णय लेखन</button>
  <button class="fb" data-s="S4">आपराधिक न्याय</button>
  <button class="fb" data-s="S5">मीडिया</button>
  <button class="fb" data-s="S7">इलेक्ट्रॉनिक साक्ष्य</button>
  <button class="fb" data-s="S8">फोरेंसिक</button>
  <button class="fb" data-s="S9">लिंग न्याय</button>
  <button class="fb" data-s="S10">विकलांग</button>
  <button class="fb" data-s="S11">ICT</button>
  <button class="fb" data-s="S12">ADR</button></div>
<div id="grid"></div>
<div id="modal" class="m">
  <div class="mc">
    <span class="cl">&times;</span>
    <h2 id="mt"></h2>
    <p id="mc" style="color:var(--muted);font-size:.8rem;margin:4px 0 10px"></p>
    <div class="ds"><span class="dl">📌 संदर्भ:</span><div id="mx" class="dv"></div></div>
    <div class="ds"><span class="dl">⚖️ कानूनी प्रश्न:</span><div id="mq" class="dv"></div></div>
    <div class="ds"><span class="dl">🏛️ न्यायालय/पक्षकार:</span><div id="mi" class="dv"></div></div>
    <div class="ds"><span class="dl">✅ निर्णय:</span><div id="mr" class="dv"></div></div>
    <div class="ds"><span class="dl">📖 विस्तृत विश्लेषण:</span><div id="ma" class="dv"></div></div>
  </div>
</div>
<script>
const allCases = [
  {"s":"S2","n":"Muzaffar Hussain v. State of UP","c":"2022 SCC OnLine SC 567","ctx":"न्यायिक अनुशासन, भ्रष्टाचार","b":"'Gratification' की व्यापक व्याख्या","q":"क्या भ्रष्टाचार संदेह पर कार्रवाई संवैधानिक है?","i":"क्या पद/प्रभाव भी Gratification में आता है?","r":"उचित जांच व प्राकृतिक न्याय पर कार्रवाई वैध है।","a":"न्यायिक पद 'संदेह से परे' होना चाहिए। अनुशासनात्मक प्रक्रिया में प्राकृतिक न्याय का पालन अनिवार्य है।"},
  {"s":"S2","n":"ECI v. M.R. Vijayabhaskar","c":"(2021) 9 SCC 770","ctx":"मीडिया स्वतंत्रता, Open Court","b":"मीडिया रिपोर्टिंग का मौलिक अधिकार","q":"क्या मीडिया को न्यायिक टिप्पणियाँ रिपोर्ट करने का अधिकार है?","i":"Article 19(1)(a) बनाम निष्पक्ष सुनवाई","r":"केवल 'Postponement Order' द्वारा अस्थायी प्रतिबंध संभव है।","a":"'Open Court' लोकतंत्र की नींव है। मीडिया रिपोर्टिंग निष्पक्ष सुनवाई को गंभीर रूप से प्रभावित करे तो ही प्रतिबंध लगाया जा सकता है।"},
  {"s":"S2","n":"Sadhna Chaudhary v. State of UP","c":"(2020) 11 SCC 760","ctx":"अनुशासनात्मक कार्रवाई, प्राकृतिक न्याय","b":"सुनवाई के अधिकार की अनिवार्यता","q":"क्या बिना सुनवाई के निलंबन संवैधानिक है?","i":"क्या प्रक्रियात्मक दोष कार्रवाई को अमान्य बनाते हैं?","r":"लिखित आरोप, प्रतिरक्षा का अवसर और निष्पक्ष जांच अनिवार्य है।","a":"'Audi Alteram Partem' सिद्धांत लागू होता है। शीघ्रता के नाम पर प्रक्रियात्मक न्याय का हनन नहीं हो सकता।"},
  {"s":"S3","n":"B.S. Hari v. Union of India","c":"2023 SCC OnLine SC 413","ctx":"Reasoned Orders","b":"तर्कसंगत आधार अनिवार्य","q":"क्या अकारण आदेश वैध हैं?","i":"क्या तथ्य-कानून कड़ी स्पष्ट होनी चाहिए?","r":"अकारण आदेश अमान्य हैं। Article 14 मनमानी रोकता है।","a":"निर्णय केवल निष्कर्ष नहीं, प्रक्रिया है। तथ्य, साक्ष्य, कानून और निष्कर्ष के बीच तार्किक कड़ी स्पष्ट होनी चाहिए।"},
  {"s":"S3","n":"Patan Jamal Vali v. State of A.P.","c":"2021 SCC OnLine SC 343","ctx":"लिंग-संवेदनशील भाषा","b":"पीड़िता गरिमा एवं गोपनीयता","q":"क्या पीड़िता को दोषी ठहराने वाली भाषा असंवैधानिक है?","i":"क्या निर्णय लेखन में पीड़िता सम्मान अनिवार्य है?","r":"निर्णय लेखन में पीड़िता की गरिमा, गोपनीयता और सम्मान अनिवार्य है। रूढ़िवादी भाषा अस्वीकार्य है।","a":"'Handbook on Combating Gender Stereotypes' का अनुपालन अनिवार्य है। पीड़िता-केंद्रित दृष्टिकोण न्यायिक प्रक्रिया की विश्वसनीयता बढ़ाता है।"},
  {"s":"S4","n":"D.K. Basu v. State of WB","c":"(1997) 1 SCC 416","ctx":"हिरासत अधिकार, 11 नियम","b":"गिरफ्तारी/हिरासत के 11 अनिवार्य नियम","q":"क्या दिशा-निर्देश संवैधानिक हैं?","i":"क्या उल्लंघन हिरासत को अवैध बनाता है?","r":"11 नियम संवैधानिक हैं। राज्य की निरपेक्ष जिम्मेदारी है।","a":"पहचान पत्र, अरेस्ट मेमो, परिवार सूचना, मेडिकल, वकील, रजिस्टर आदि। उल्लंघन = अवैध हिरासत + मुआवजा।"},
  {"s":"S4","n":"Arnesh Kumar v. State of Bihar","c":"(2014) 8 SCC 273","ctx":"धारा 41/41A CrPC","b":"7 वर्ष से कम सजा में रूटीन अरेस्ट बंद","q":"क्या पुलिस हर केस में तुरंत अरेस्ट करे?","i":"क्या धारा 41/41A का पालन अनिवार्य है?","r":"रूटीन अरेस्ट अवैध। लिखित कारण + 41A नोटिस अनिवार्य।","a":"व्यक्तिगत स्वतंत्रता प्राथमिक है। अरेस्ट से पहले जांच, संतुष्टि रिकॉर्ड, और नोटिस जारी करना अनिवार्य है।"},
  {"s":"S4","n":"Hussainara Khatoon v. Home Secy., Bihar","c":"(1980) 1 SCC 81","ctx":"Speedy Trial, कानूनी सहायता","b":"बिना मुकदमे हिरासत व मुफ्त वकील","q":"क्या Speedy Trial मौलिक अधिकार है?","i":"क्या गरीब आरोपियों को मुफ्त कानूनी सहायता का अधिकार है?","r":"'Speedy Trial' Article 21 का अभिन्न अंग है। गरीब आरोपियों को मुफ्त कानूनी सहायता का अधिकार है।","a":"बिना मुकदमे लंबी हिरासत मानवाधिकार उल्लंघन है। गरीब आरोपियों को मुफ्त कानूनी सहायता और उचित जमानत प्रक्रिया का अधिकार है।"},
  {"s":"S5","n":"Sahara India v. SEBI","c":"(2012) 10 SCC 603","ctx":"Trial by Media, Postponement","b":"निष्पक्ष सुनवाई बनाम प्रेस स्वतंत्रता","q":"क्या मीडिया रिपोर्टिंग रोकना संवैधानिक है?","i":"Article 19 vs Article 21 संतुलन","r":"न्यायालय 'Postponement Order' जारी कर सकता है यदि मीडिया रिपोर्टिंग निष्पक्ष सुनवाई को बाधित करे।","a":"'Freedom of Press' और 'Right to Fair Trial' दोनों मौलिक अधिकार हैं। जब मीडिया रिपोर्टिंग गवाहों को प्रभावित करे या संवेदनशील साक्ष्य सार्वजनिक करे, तो अस्थायी प्रतिबंध लगाया जा सकता है।"},
  {"s":"S7","n":"Arjun Panditrao Khotkar v. Kailash Gorantyal","c":"(2020) 7 SCC 1","ctx":"Section 65B प्रमाणपत्र","b":"इलेक्ट्रॉनिक साक्ष्य के लिए सर्टिफिकेट अनिवार्य","q":"क्या Section 65B(4) सर्टिफिकेट अनिवार्य है?","i":"क्या मूल डिवाइस पेश करने पर सर्टिफिकेट वैकल्पिक है?","r":"हाँ, Section 65B(4) एक 'Complete Code' है। सर्टिफिकेट अनिवार्य है, किंतु यदि मूल डिवाइस न्यायालय में पेश किया जाए तो सर्टिफिकेट की आवश्यकता नहीं।","a":"इस निर्णय ने Anvar PV (2014) के सिद्धांत को स्पष्ट और सुदृढ़ किया। इलेक्ट्रॉनिक साक्ष्य (CD, DVD, WhatsApp, Email, CDR) को धारा 65B के तहत ही स्वीकार किया जाएगा।"},
  {"s":"S8","n":"Selvi v. State of Karnataka","c":"(2010) 7 SCC 263","ctx":"नार्को/पॉलीग्राफ/BEAP परीक्षण","b":"बिना सहमति वैज्ञानिक परीक्षण अमान्य","q":"क्या बिना स्वैच्छिक सहमति के परीक्षण Article 20(3) का उल्लंघन है?","i":"क्या ऐसे बयान साक्ष्य के रूप में स्वीकार्य हैं?","r":"बिना सहमिति के वैज्ञानिक परीक्षण Article 20(3) और Article 21 का उल्लंघन है। ऐसे बयान साक्ष्य के रूप में अस्वीकार्य हैं।","a":"मानसिक गोपनीयता और आत्म-सुरक्षा का अधिकार मौलिक है। बिना लिखित, स्वैच्छिक और कानूनी सलाह के बाद सहमति के ऐसे परीक्षण अमान्य हैं।"},
  {"s":"S9","n":"Joseph Shine v. Union of India","c":"(2019) 3 SCC 39","ctx":"व्यभिचार अपराधीकरण","b":"Section 497 IPC असंवैधानिक","q":"क्या Section 497 IPC Article 14, 15, 21 का उल्लंघन करता है?","i":"क्या व्यभिचार को केवल पुरुष के विरुद्ध अपराध मानना लैंगिक भेदभाव है?","r":"Section 497 IPC असंवैधानिक है। यह महिलाओं को पुरुष की 'संपत्ति' मानता है। व्यभिचार अब केवल तलाक का नागरिक आधार है।","a":"5 जजों की पीठ ने ऐतिहासिक निर्णय देते हुए कहा कि विवाह संस्था पुरुष प्रधान नहीं हो सकती। 'Sexual Autonomy' और 'Privacy' को Article 21 का अभिन्न अंग माना गया।"},
  {"s":"S10","n":"Vikash Kumar v. UPSC","c":"(2021) 5 SCC 370","ctx":"Reasonable Accommodation","b":"परीक्षा में सहायता मौलिक अधिकार","q":"क्या परीक्षाओं में अतिरिक्त समय/सहायक प्रदान करना राज्य का कर्तव्य है?","i":"क्या विकलांगता के आधार पर असमान स्थिति Article 14 का उल्लंघन है?","r":"हाँ, Reasonable Accommodation मौलिक अधिकार है। RPwD Act 2016 और Article 14/21 के तहत सार्वभौमिक पहुँच।","a":"इस निर्णय ने 'Substantive Equality' की अवधारणा को सुदृढ़ किया। विकलांग व्यक्ति को 'समान परिणाम' प्राप्त करने के लिए समायोजन की आवश्यकता होती है।"},
  {"s":"S11","n":"Swapnil Tripathi v. Supreme Court","c":"(2018) 10 SCC 639","ctx":"लाइव स्ट्रीमिंग","b":"संवैधानिक मामलों की लाइव स्ट्रीमिंग वैध","q":"क्या न्यायिक कार्यवाही की लाइव स्ट्रीमिंग संवैधानिक है?","i":"क्या पारदर्शिता और न्यायिक शिक्षा अनिवार्य है?","r":"उच्च महत्व वाले संवैधानिक मामलों की लाइव स्ट्रीमिंग जनता के 'Right to Know' के तहत अनुमत्य है।","a":"'Open Court' सिद्धांत का आधुनिक स्वरूप डिजिटल पहुँच है। लाइव स्ट्रीमिंग से नागरिक न्यायिक प्रक्रिया को समझ सकते हैं और भ्रष्टाचार/पक्षपात के आरोप कम होते हैं।"},
  {"s":"S12","n":"Vidya Drolia v. Durga Trading","c":"(2021) 2 SCC 1","ctx":"मध्यस्थता योग्यता","b":"मध्यस्थता योग्यता का 4-चरणीय परीक्षण","q":"कौन से विवाद मध्यस्थता के लिए योग्य नहीं हैं?","i":"क्या सार्वजनिक नीति या अनिवार्य कानून वाले विवाद मध्यस्थता योग्य हैं?","r":"4-चरणीय परीक्षण: (1) योग्यता (2) समझौता वैधता (3) पक्षकार बंधन (4) सार्वजनिक नीति। केवल गंभीर मामलों में न्यायिक हस्तक्षेप वैध।","a":"दंडात्मक अपराध, वैवाहिक विवाद, दिवालिया प्रक्रिया मध्यस्थता योग्य नहीं हैं। अन्य सभी वाणिज्यिक/दीवानी विवाद मध्यस्थता के अधीन आते हैं।"}
];

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const filters = document.querySelectorAll('.fb');
let currentFilter = 'all';

function render() {
  const term = search.value.toLowerCase();
  grid.innerHTML = '';
  const filtered = allCases.filter(c => 
    (currentFilter === 'all' || c.s === currentFilter) &&
    (c.n.toLowerCase().includes(term) || c.ctx.toLowerCase().includes(term) || c.b.toLowerCase().includes(term))
  );
  filtered.forEach(c => {
    const card = document.createElement('div');
    card.className = 'c';
    card.innerHTML = `<span class="st">${c.s.replace('S','Session ')}</span><div class="cn">${c.n}</div><div class="cc">${c.c}</div><div class="cb">${c.b}</div>`;
    card.onclick = () => showModal(c);    grid.appendChild(card);
  });
}

function showModal(c) {
  document.getElementById('mt').textContent = c.n;
  document.getElementById('mc').textContent = c.c;
  document.getElementById('mx').textContent = c.ctx;
  document.getElementById('mq').textContent = c.q;
  document.getElementById('mi').textContent = c.i;
  document.getElementById('mr').textContent = c.r;
  document.getElementById('ma').textContent = c.a;
  document.getElementById('modal').style.display = 'flex';
}

document.querySelector('.cl').onclick = () => document.getElementById('modal').style.display = 'none';
document.getElementById('modal').onclick = e => { if(e.target.id==='modal') document.getElementById('modal').style.display='none'; };
search.addEventListener('input', render);
filters.forEach(b => {
  b.onclick = () => {
    filters.forEach(f => f.classList.remove('act'));
    b.classList.add('act');
    currentFilter = b.dataset.s;
    render();
  };
});
render();
</script>
</body>

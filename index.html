  .cl{position:absolute;top:10px;right:15px;font-size:1.8rem;cursor:pointer;color:var(--muted)}
  .ds{margin-bottom:12px}
  .dl{color:var(--acc);font-weight:600;margin-bottom:3px;display:block}
  .dv{white-space:pre-wrap;font-size:.95rem}

  {"s":"S2","n":"High Court of Rajasthan v. Ramesh Chand Paliwal","c":"(1998) 3 SCC 72","ctx":"न्यायिक व्यवहार, सम्मान","q":"क्या अशिष्ट या पक्षपातपूर्ण व्यवहार न्यायिक गरिमा के विरुद्ध है?","i":"क्या सम्मानजनक व्यवहार न्यायिक प्रक्रिया का हिस्सा है?","r":"न्यायिक अधिकारी को सम्मानजनक, संयमित और निष्पक्ष व्यवहार बनाए रखना चाहिए। अशिष्टता न्यायिक प्रक्रिया को दूषित करती है।","d":"न्यायिक गरिमा केवल निर्णय में नहीं, बल्कि व्यवहार में भी झलकनी चाहिए। सम्मानजनक व्यवहार न्यायिक प्रक्रिया की विश्वसनीयता बढ़ाता है।"},
  {"s":"S2","n":"High Court of Bombay v. Uday Singh","c":"(1997) 5 SCC 129","ctx":"भ्रष्टाचार, बर्खास्तगी","q":"क्या न्यायिक पद की गरिमा बनाए रखने के लिए कठोर दंड उचित है?","i":"क्या भ्रष्टाचार न्यायिक प्रणाली की नींव को खोखला करता है?","r":"भ्रष्टाचार या अनैतिक आचरण न्यायिक प्रणाली की नींव को खोखला करता है। प्रमाणित मामलों में बर्खास्तगी वैध और आवश्यक है।","d":"न्यायपालिका का विश्वास उसकी अखंडता पर निर्भर है। भ्रष्टाचार सार्वजनिक विश्वास को नष्ट करता है, इसलिए कड़ी कार्रवाई आवश्यक है।"},
  {"s":"S2","n":"C. Ravichandran Iyer v. Justice A.M. Bhattacharjee","c":"(1995) 5 SCC 457","ctx":"न्यायिक स्वतंत्रता, बाह्य दबाव","q":"क्या बाह्य दबाव या राजनीतिक हस्तक्षेप से न्यायिक निर्णय प्रभावित हो सकते हैं?","i":"क्या न्यायिक स्वतंत्रता संविधान की मूल संरचना है?","r":"न्यायिक स्वतंत्रता संविधान की मूल संरचना है। न्यायाधीशों को बाह्य दबाव, भय या प्रलोभन से मुक्त होकर निर्णय लेना चाहिए।","d":"न्यायिक स्वतंत्रता लोकतंत्र की रक्षा करती है। बाह्य दबाव से मुक्ति न्यायिक निर्णयों की विश्वसनीयता के लिए आवश्यक है।"},
  {"s":"S2","n":"Union of India v. K.K. Dhawan","c":"AIR 1993 SC 1478","ctx":"अनुशासनात्मक मानदंड, गंभीर आचरण भंग","q":"क्या 'Grave misconduct' की परिभाषा में लापरवाही, दुराचार या पक्षपात शामिल है?","i":"क्या प्रक्रियात्मक न्याय अनुशासनात्मक कार्रवाई में अनिवार्य है?","r":"अनुशासनात्मक कार्रवाई केवल गंभीर आचरण भंग, लापरवाही या पक्षपात की स्थिति में ही संभव है। प्रक्रियात्मक न्याय अनिवार्य है।","d":"अनुशासनात्मक कार्रवाई का उद्देश्य सुधार है, दंड नहीं। गंभीर मामलों में ही कार्रवाई उचित है और प्रक्रियात्मक न्याय का पालन अनिवार्य है।"},
  {"s":"S2","n":"Daya Shankar v. High Court of Allahabad","c":"(1987) 3 SCC 1","ctx":"न्यायालय की गरिमा, न्यायिक आचरण","q":"क्या अशिष्ट या अनैतिक व्यवहार अवमानना या अनुशासनात्मक कार्रवाई का आधार है?","i":"क्या न्यायिक अधिकारी का आचरण उच्चतम नैतिक मानकों पर होना चाहिए?","r":"न्यायिक अधिकारी का आचरण उच्चतम नैतिक मानकों पर होना चाहिए। गरिमा हानि न्यायिक प्रक्रिया की विश्वसनीयता को क्षति पहुंचाती है।","d":"न्यायिक पद का विशेष दर्जा है। आचरण में नैतिकता न्यायिक प्रक्रिया की विश्वसनीयता और सार्वजनिक विश्वास का आधार है।"},

  {"s":"S3","n":"B.S. Hari v. Union of India","c":"2023 SCC OnLine SC 413","ctx":"Reasoned Orders","q":"क्या बिना तर्कसंगत आधार दिए प्रशासनिक/न्यायिक आदेश वैध हैं?","i":"क्या निर्णय में तथ्यों और कानून का स्पष्ट उल्लेख अनिवार्य है?","r":"प्रत्येक निर्णय में तर्कसंगत आधार, साक्ष्य मूल्यांकन और कानूनी व्याख्या होनी चाहिए। अकारण आदेश अमान्य हैं।","d":"Article 14 के तहत मनमानी से सुरक्षा के लिए, प्रत्येक आदेश में तथ्य, साक्ष्य, लागू कानून और निष्कर्ष के बीच तार्किक कड़ी स्पष्ट होनी चाहिए।"},
  {"s":"S3","n":"SBI v. Ajay Kumar Sood","c":"(2023) 7 SCC 282","ctx":"निर्णय लेखन में स्पष्टता","q":"क्या अति-विस्तार या अस्पष्ट भाषा न्यायिक प्रक्रिया को बाधित करती है?","i":"क्या संक्षिप्त निर्णय न्यायिक पहुँच को बढ़ावा देते हैं?","r":"निर्णय स्पष्ट, संक्षिप्त और तथ्यात्मक होना चाहिए। अनावश्यक विस्तार या जटिल भाषा न्यायिक पहुँच को कमजोर करती है।","d":"स्पष्ट निर्णय पक्षकारों, वकीलों और अपीलीय न्यायालय के लिए समझने योग्य होते हैं। संक्षिप्तता न्यायिक दक्षता बढ़ाती है।"},
  {"s":"S3","n":"Shakuntala Shukla v. State of Uttar Pradesh","c":"2021 SCC OnLine SC 672","ctx":"सभी तर्कों पर विचार","q":"क्या महत्वपूर्ण साक्ष्यों या तर्कों की उपेक्षा निर्णय को अमान्य बनाती है?","i":"क्या न्यायालय को प्रत्येक महत्वपूर्ण तर्क पर विचार करना चाहिए?","r":"न्यायालय को प्रत्येक महत्वपूर्ण तर्क और साक्ष्य पर विचार करना चाहिए। उपेक्षा निर्णय की वैधता को प्रभावित करती है।","d":"निष्पक्ष सुनवाई का अर्थ है सभी पक्षों के तर्कों पर विचार। महत्वपूर्ण तर्क की उपेक्षा निर्णय को असंवैधानिक बना सकती है।"},
  {"s":"S3","n":"Ajit Mohan v. Legislative Assembly Delhi","c":"2021 SCC OnLine SC 495","ctx":"तर्कसंगतता, संवैधानिक मूल्य","q":"क्या न्यायिक सक्रियता और संयम के बीच सीमा निर्धारित की जा सकती है?","i":"क्या निर्णय में तथ्यात्मक विश्लेषण और संवैधानिक सिद्धांतों का संतुलन होना चाहिए?","r":"निर्णय में तथ्यात्मक विश्लेषण और संवैधानिक सिद्धांतों का संतुलन होना चाहिए। न्यायिक हस्तक्षेप सीमाओं में होना चाहिए।","d":"न्यायिक सक्रियता लोकतंत्र को सुदृढ़ करती है, किंतु अति-सक्रियता प्रशासनिक स्वायत्तता को प्रभावित कर सकती है। संतुलन आवश्यक है।"},
  {"s":"S3","n":"Patan Jamal Vali v. State of A.P.","c":"2021 SCC OnLine SC 343","ctx":"लिंग-संवेदनशील भाषा","q":"क्या पीड़िता को दोषी ठहराने वाली भाषा संवैधानिक गरिमा के विरुद्ध है?","i":"क्या निर्णय लेखन में पीड़िता की गरिमा और गोपनीयता अनिवार्य है?","r":"निर्णय लेखन में पीड़िता की गरिमा, गोपनीयता और सम्मान अनिवार्य है। रूढ़िवादी या अपमानजनक भाषा अस्वीकार्य है।","d":"'Handbook on Combating Gender Stereotypes' का अनुपालन अनिवार्य है। पीड़िता-केंद्रित दृष्टिकोण न्यायिक प्रक्रिया की विश्वसनीयता बढ़ाता है।"},
  {"s":"S3","n":"Aparna Bhat v. State of M.P.","c":"2021 SCC OnLine SC 230","ctx":"जमानत आदेश, लिंग-रूढ़िवादिता","q":"क्या अपमानजनक या रूढ़िवादी शर्तें जमानत आदेश को अमान्य बनाती हैं?","i":"क्या जमानत शर्तें तटस्थ और गरिमापूर्ण होनी चाहिए?","r":"जमानत शर्तें तटस्थ, वैज्ञानिक और गरिमापूर्ण होनी चाहिए। 'Handbook on Combating Gender Stereotypes' का अनुपालन अनिवार्य है।","d":"जमानत आदेश में रूढ़िवादी भाषा या शर्तें पीड़िता की गरिमा को क्षति पहुंचाती हैं। न्यायिक भाषा संवेदनशील और तटस्थ होनी चाहिए।"},
  {"s":"S3","n":"U.P.S.C. v. Bibhu Prasad Sarangi","c":"(2021) 4 SCC 516","ctx":"प्रशासनिक आदेश, तर्कसंगतता","q":"क्या मनमाने या अस्पष्ट आदेश न्यायिक समीक्षा के अधीन हैं?","i":"क्या प्रशासनिक निर्णय भी तर्कसंगत और पारदर्शी होने चाहिए?","r":"प्रशासनिक निर्णय भी तर्कसंगत, पारदर्शी और कानून के अनुसार होने चाहिए। मनमानी न्यायिक हस्तक्षेप को आमंत्रित करती है।","d":"Article 14 के तहत मनमानी से सुरक्षा प्रशासनिक निर्णयों पर भी लागू होती है। तर्कसंगत आधार न्यायिक समीक्षा को सुगम बनाता है।"},
  {"s":"S3","n":"Surjeet Singh v. Sadhu Singh","c":"(2019) 2 SCC 396","ctx":"संपत्ति विवाद, निर्णय संरचना","q":"क्या तथ्य, मुद्दे, साक्ष्य मूल्यांकन और निष्कर्ष का क्रम अनिवार्य है?","i":"क्या संरचनात्मक लेखन न्यायिक पारदर्शिता बढ़ाता है?","r":"निर्णय संरचनात्मक होना चाहिए: तथ्य → मुद्दे → साक्ष्य विश्लेषण → कानूनी लागू → निष्कर्ष। अराजक लेखन न्यायिक पारदर्शिता को कमजोर करता है।","d":"संरचनात्मक निर्णय पक्षकारों और अपीलीय न्यायालय के लिए समझने योग्य होते हैं। स्पष्ट संरचना न्यायिक जवाबदेही बढ़ाती है।"},  {"s":"S3","n":"Nipun Saxena v. Union of India","c":"(2019) 2 SCC 703","ctx":"पीड़िता पहचान, गोपनीयता","q":"क्या निर्णय, मीडिया या रिकॉर्ड में पहचान उजागर करना कानून के विरुद्ध है?","i":"क्या पीड़िता की पहचान पूर्णतः गोपनीय रखी जानी चाहिए?","r":"पीड़िता की पहचान पूर्णतः गोपनीय रखी जानी चाहिए। निर्णय में भी गुमनाम पहचान (Initials/Alias) का उपयोग अनिवार्य है।","d":"यौन अपराध पीड़िता की गरिमा और गोपनीयता संवैधानिक अधिकार है। पहचान उजागर करना द्वितीयक पीड़ा का कारण बन सकता है।"},
  {"s":"S3","n":"Kanailal v. Ram Chandra Singh","c":"(2018) 13 SCC 715","ctx":"दीवानी निर्णय, स्पष्टता","q":"क्या दीवानी मामलों में भी तर्कसंगत आधार और साक्ष्य मूल्यांकन अनिवार्य है?","i":"क्या दीवानी निर्णय भी संरचनात्मक होने चाहिए?","r":"दीवानी निर्णय भी तथ्य, साक्ष्य, कानूनी सिद्धांत और निष्कर्ष पर आधारित होना चाहिए। अस्पष्टता अपील को जटिल बनाती है।","d":"दीवानी मामलों में भी न्यायिक पारदर्शिता आवश्यक है। स्पष्ट निर्णय पक्षकारों को न्यायिक प्रक्रिया समझने में सहायता करते हैं।"},
  {"s":"S3","n":"State of Gujarat v. R.A. Mehta","c":"(2013) 3 SCC 1","ctx":"न्यायिक सक्रियता, संयम","q":"क्या प्रशासनिक निर्णयों में न्यायिक हस्तक्षेप की सीमाएँ निर्धारित हैं?","i":"क्या न्यायालय को प्रशासनिक विवेक का सम्मान करना चाहिए?","r":"न्यायालय को प्रशासनिक विवेक का सम्मान करना चाहिए, किंतु असंवैधानिकता या मनमानी की स्थिति में हस्तक्षेप वैध है।","d":"न्यायिक सक्रियता लोकतंत्र को सुदृढ़ करती है, किंतु अति-हस्तक्षेप प्रशासनिक स्वायत्तता को प्रभावित कर सकता है। संतुलन आवश्यक है।"},
  {"s":"S3","n":"Board of Trustees v. Union of India","c":"(2012) 10 SCC 734","ctx":"PIL, सामूहिक हित","q":"क्या PIL में न्यायिक आदेश व्यावहारिक और कार्यान्वयन योग्य होने चाहिए?","i":"क्या सामाजिक न्याय और व्यावहारिक कार्यान्वयन का संतुलन आवश्यक है?","r":"PIL निर्णय में सामाजिक न्याय, संवैधानिक मूल्य और व्यावहारिक कार्यान्वयन तंत्र का उल्लेख अनिवार्य है।","d":"PIL न्यायिक सक्रियता का माध्यम है। निर्णय में केवल घोषणा नहीं, बल्कि कार्यान्वयन तंत्र भी स्पष्ट होना चाहिए।"},
  {"s":"S3","n":"CIT v. Saheli Leasing","c":"(2010) 6 SCC 384","ctx":"कर निर्णय, तकनीकी विश्लेषण","q":"क्या कर मामलों में तथ्यात्मक आधार और कानूनी प्रावधानों का स्पष्ट उल्लेख आवश्यक है?","i":"क्या तकनीकी सटीकता कर विवादों को कम करती है?","r":"कर निर्णय तकनीकी रूप से सटीक, तथ्यात्मक और कानूनी व्याख्या पर आधारित होना चाहिए। अस्पष्टता कर विवादों को बढ़ावा देती है।","d":"कर मामलों में तकनीकी जटिलता अधिक होती है। स्पष्ट और सटीक निर्णय पक्षकारों को कानूनी स्थिति समझने में सहायता करते हैं।"},
  {"s":"S3","n":"Reliance Airport Developers v. AAI","c":"(2006) 10 SCC 1","ctx":"वाणिज्यिक विवाद, अनुबंध व्याख्या","q":"क्या अनुबंध व्याख्या और बाजार वास्तविकता का संतुलन आवश्यक है?","i":"क्या वाणिज्यिक निर्णय में बाजार संदर्भ का उल्लेख होना चाहिए?","r":"वाणिज्यिक निर्णय में अनुबंध शर्तें, बाजार संदर्भ, और कानूनी सिद्धांतों का संतुलित विश्लेषण होना चाहिए।","d":"वाणिज्यिक विवादों में तकनीकी और बाजार ज्ञान आवश्यक है। संतुलित निर्णय व्यापारिक निश्चितता बढ़ाते हैं।"},
  {"s":"S3","n":"B (A Child) (Adequacy of Reasons)","c":"[2022] EWCA Civ 407","ctx":"कारणों की पर्याप्तता, अंतर्राष्ट्रीय मानक","q":"क्या पक्षकारों को समझ आने योग्य तर्क अनिवार्य हैं?","i":"क्या पर्याप्तता न्यायिक जवाबदेही का मानदंड है?","r":"निर्णय के कारण पक्षकारों, अपीलीय न्यायालय और सार्वजनिक के लिए स्पष्ट और तर्कसंगत होने चाहिए। पर्याप्तता न्यायिक जवाबदेही का मानदंड है।","d":"अंतर्राष्ट्रीय न्यायिक मानकों के अनुसार, निर्णय के कारण स्पष्ट और समझने योग्य होने चाहिए। यह न्यायिक पारदर्शिता और जवाबदेही का आधार है।"},

  // SESSION 4 (सभी मामले)
  {"s":"S4","n":"Judgebir Singh v. NIA","c":"2023 SCC OnLine SC 543","ctx":"UAPA जमानत, Twin Conditions","q":"क्या अभियोजन के प्रारंभिक साक्ष्य के आधार पर जमानत अस्वीकार की जा सकती है?","i":"क्या व्यक्तिगत स्वतंत्रता और राष्ट्रीय सुरक्षा का संतुलन आवश्यक है?","r":"UAPA धारा 43D(5) के तहत जमानत केवल तभी संभव है जब अभियोजन के साक्ष्य में दोष न हो। व्यक्तिगत स्वतंत्रता और राष्ट्रीय सुरक्षा का संतुलन आवश्यक है।","d":"UAPA एक विशेष कानून है। जमानत के 'Twin Conditions' का सख्त अनुप्रयोग राष्ट्रीय सुरक्षा के लिए आवश्यक है, किंतु व्यक्तिगत स्वतंत्रता भी संरक्षित रहनी चाहिए।"},
  {"s":"S4","n":"Kanchan Kumari v. State of Bihar","c":"2022 SCC OnLine SC 981","ctx":"हिरासत अधिकार, D.K. Basu दिशा-निर्देश","q":"क्या D.K. Basu दिशा-निर्देशों का पालन अनिवार्य है?","i":"क्या उल्लंघन हिरासत को अवैध बनाता है?","r":"हिरासत अधिकार संवैधानिक हैं। दिशा-निर्देशों का उल्लंघन हिरासत को अवैध बनाता है। राज्य की जिम्मेदारी निरपेक्ष है।","d":"D.K. Basu के 11 नियम हिरासत में मानवाधिकार संरक्षण के लिए आधारभूत हैं। उल्लंघन की स्थिति में राज्य निरपेक्ष जिम्मेदार है।"},
  {"s":"S4","n":"Manjeet Singh v. State of Haryana","c":"AIR 2021 SC 4274","ctx":"निष्पक्ष जांच, साक्ष्य संग्रह","q":"क्या जांच अधिकारी की पक्षपाती भूमिका मुकदमे को प्रभावित करती है?","i":"क्या जांच में पारदर्शिता और निष्पक्षता अनिवार्य है?","r":"जांच निष्पक्ष, पारदर्शी और प्रक्रियात्मक न्याय के अनुसार होनी चाहिए। पक्षपात साक्ष्य को दूषित करता है।","d":"निष्पक्ष जांच निष्पक्ष मुकदमे की पूर्व-शर्त है। पक्षपात या साक्ष्य छेड़छाड़ मुकदमे की वैधता को प्रभावित करती है।"},
  {"s":"S4","n":"Sartaj Singh v. State of Haryana","c":"(2021) 5 SCC 337","ctx":"Speedy Trial, मुकदमे में विलंब","q":"क्या विलंब के कारणों का विश्लेषण और निवारण अनिवार्य है?","i":"क्या विलंब Article 21 का उल्लंघन है?","r":"विलंब Article 21 का उल्लंघन है। न्यायालय को विलंब के कारणों का विश्लेषण कर त्वरित सुनवाई सुनिश्चित करनी चाहिए।","d":"'Speedy Trial' मौलिक अधिकार है। विलंब आरोपी की स्वतंत्रता और न्यायिक प्रक्रिया की विश्वसनीयता को प्रभावित करता है।"},
  {"s":"S4","n":"Ajay Kumar Pandey v. State of U.P.","c":"2021 SCC OnLine All 77","ctx":"जमानत सिद्धांत, जोखिम मूल्यांकन","q":"क्या जमानत अस्वीकार करने के लिए ठोस साक्ष्य आवश्यक हैं?","i":"क्या सामान्य संदेह पर्याप्त है?","r":"जमानत अस्वीकार करने के लिए विशिष्ट और प्रमाणित जोखिम होना चाहिए। सामान्य संदेह पर्याप्त नहीं है।","d":"जमानत व्यक्तिगत स्वतंत्रता का हिस्सा है। अस्वीकार करने के लिए ठोस और प्रमाणित जोखिम दिखाना आवश्यक है, केवल संदेह पर्याप्त नहीं है।"},
  {"s":"S4","n":"V.N. Patil v. K. Niranjan Kumar","c":"(2021) 3 SCC 661","ctx":"CrPC व्याख्या, प्रक्रियात्मक न्याय","q":"क्या प्रक्रियात्मक चूक मुकदमे को अमान्य बनाती है?","i":"क्या प्रक्रियात्मक न्याय और तथ्यात्मक न्याय का संतुलन आवश्यक है?","r":"CrPC प्रक्रिया अनिवार्य है। गंभीर चूक मुकदमे को प्रभावित कर सकती है, किंतु तथ्यात्मक न्याय प्राथमिक है।","d":"प्रक्रियात्मक न्याय महत्वपूर्ण है, किंतु अत्यधिक तकनीकीता न्याय को बाधित नहीं करनी चाहिए। तथ्यात्मक न्याय प्राथमिक लक्ष्य है।"},
  {"s":"S4","n":"Gangadhar v. State of M.P.","c":"(2020) 9 SCC 202","ctx":"साक्ष्य मूल्यांकन, संदेह का लाभ","q":"क्या परोक्ष साक्ष्य की कड़ी सिद्धांत का पालन अनिवार्य है?","i":"क्या संदेह का लाभ हमेशा अभियुक्त को दिया जाना चाहिए?","r":"साक्ष्य विश्वसनीय, सुसंगत और तर्कसंगत होना चाहिए। संदेह का लाभ हमेशा अभियुक्त को दिया जाना चाहिए।","d":"आपराधिक मुकदमे में 'Beyond Reasonable Doubt' मानक लागू होता है। संदेह की स्थिति में लाभ अभियुक्त को देना न्यायिक सिद्धांत है।"},
  {"s":"S4","n":"Mahender Chawla v. Union of India","c":"2018 SCC Online SC 2678","ctx":"कैदी अधिकार, मानवीय उपचार","q":"क्या जेल प्रशासन की लापरवाही संवैधानिक अधिकारों का उल्लंघन है?","i":"क्या कैदी भी मौलिक अधिकारों के हकदार हैं?","r":"कैदी भी मौलिक अधिकारों के हकदार हैं। मानवीय उपचार, स्वास्थ्य और कानूनी सहायता राज्य का कर्तव्य है।","d":"कारावास का अर्थ मौलिक अधिकारों का हनन नहीं है। राज्य को कैदियों के मानवाधिकार, स्वास्थ्य और पुनर्वास की व्यवस्था करनी चाहिए।"},
  {"s":"S4","n":"Balakram v. State of Uttarakhand","c":"(2017) 7 SCC 668","ctx":"हिरासत यातना, राज्य जिम्मेदारी","q":"क्या यातना के आरोप में स्वतंत्र जांच अनिवार्य है?","i":"क्या राज्य को मुआवजा देना होगा?","r":"हिरासत में यातना अवैध है। राज्य को मुआवजा देना होगा और जिम्मेदार अधिकारियों के विरुद्ध कार्रवाई होनी चाहिए।","d":"हिरासत यातना मानवाधिकारों का गंभीर उल्लंघन है। राज्य निरपेक्ष जिम्मेदार है और मुआवजा देना संवैधानिक कर्तव्य है।"},
  {"s":"S4","n":"Ajay Singh v. State of Chhattisgarh","c":"2017 SCC OnLine SC 24","ctx":"जांच मानक, साक्ष्य संरक्षण","q":"क्या साक्ष्य दुरुपयोग या छेड़छाड़ जांच को अमान्य बनाती है?","i":"क्या चेन ऑफ कस्टडी अनिवार्य है?","r":"जांच पारदर्शी और वैज्ञानिक मानकों पर होनी चाहिए। साक्ष्य संरक्षण और चेन ऑफ कस्टडी अनिवार्य है।","d":"साक्ष्य की अखंडता मुकदमे की वैधता के लिए आवश्यक है। चेन ऑफ कस्टडी और वैज्ञानिक संग्रह प्रक्रिया अनिवार्य हैं।"},
  {"s":"S4","n":"Amrutbhai Patel v. Sumanbhai Patel","c":"AIR 2017 SC 774","ctx":"समझौता योग्य अपराध, धारा 320 CrPC","q":"क्या न्यायिक अनुमति के बिना समझौता वैध है?","i":"क्या पीड़िता की स्वैच्छिक सहमति अनिवार्य है?","r":"समझौता केवल धारा 320 CrPC के अंतर्गत और न्यायिक अनुमति से वैध है। पीड़िता की स्वैच्छिक सहमति अनिवार्य है।","d":"समझौता योग्य अपराधों में पीड़िता की सहमति और न्यायिक अनुमति दोनों आवश्यक हैं। दबाव या प्रलोभन से की गई सहमति अमान्य है।"},
  {"s":"S4","n":"Youth Bar Association v. Union of India","c":"(2016) 9 SCC 473","ctx":"FIR सार्वजनिक पहुँच, गोपनीयता","q":"क्या FIR ऑनलाइन उपलब्ध कराना पारदर्शिता है या गोपनीयता का उल्लंघन?","i":"क्या संवेदनशील मामलों में गोपनीयता बनाए रखी जा सकती है?","r":"FIR की प्रतिलिपि सार्वजनिक होनी चाहिए, किंतु संवेदनशील मामलों में गोपनीयता बनाए रखी जा सकती है। पारदर्शिता लोकतांत्रिक आवश्यकता है।","d":"FIR की सार्वजनिक पहुँच पारदर्शिता बढ़ाती है, किंतु पीड़िता/गवाह सुरक्षा और जांच अखंडता के लिए गोपनीयता भी आवश्यक है। संतुलन आवश्यक है।"},
  {"s":"S4","n":"Sudhir Bhaskarrao Tambe v. Hemant Dhage","c":"(2016) 6 SCC","ctx":"FIR रद्द करना, धारा 482 CrPC","q":"क्या न्यायिक विवेक से FIR रद्द की जा सकती है?","i":"क्या दुरुपयोग, अनुचित हिरासत या कानूनी आधार की कमी में रद्दीकरण वैध है?","r":"FIR रद्द करना न्यायिक विवेक का विषय है। दुरुपयोग, अनुचित हिरासत या कानूनी आधार की कमी में रद्दीकरण वैध है।","d":"धारा 482 CrPC के तहत उच्च न्यायालय को निहित शक्तियाँ हैं। न्यायिक हित और दुरुपयोग रोकने के लिए रद्दीकरण वैध है।"},
  {"s":"S4","n":"Bablu Kumar v. State of Bihar","c":"(2015) 8 SCC 787","ctx":"किशोर न्याय, बाल हित","q":"क्या उम्र संदेह की स्थिति में बाल न्याय बोर्ड का हस्तक्षेप अनिवार्य है?","i":"क्या बाल हित प्राथमिक है?","r":"बाल हित प्राथमिक है। उम्र संदेह में JJ Act के तहत पुनर्वास और विशेष प्रक्रिया लागू होगी।","d":"किशोर न्याय का उद्देश्य दंड नहीं, पुनर्वास है। उम्र संदेह में बाल हित प्राथमिक मानदंड है और विशेष प्रक्रिया लागू होती है।"},
  {"s":"S4","n":"Vinod Kumar v. State of Punjab","c":"(2015) 3 SCC 220","ctx":"दंड निर्धारण, अनुपात सिद्धांत","q":"क्या दंड में न्यायिक विवेक और अनुपात सिद्धांत लागू है?","i":"क्या दोषी की पृष्ठभूमि और पुनर्वास की संभावना दंड को प्रभावित करती है?","r":"दंड अपराध की प्रकृति, दोषी की पृष्ठभूमि और पुनर्वास की संभावना पर आधारित होना चाहिए। असमानुपातिक दंड अमान्य है।","d":"दंड का उद्देश्य सुधार और निवारण है। अनुपात सिद्धांत के अनुसार दंड अपराध की गंभीरता और दोषी की परिस्थितियों के अनुरूप होना चाहिए।"},
  {"s":"S4","n":"Hardeep Singh v. State of Punjab","c":"(2014) 3 SCC 92","ctx":"मजिस्ट्रेट जांच, धारा 202 CrPC","q":"क्या मजिस्ट्रेट की जांच निष्पक्ष और पारदर्शी होनी चाहिए?","i":"क्या साक्ष्य संरक्षण और रिकॉर्डिंग अनिवार्य है?","r":"मजिस्ट्रेट जांच पक्षपात रहित और प्रक्रियात्मक न्याय के अनुसार होनी चाहिए। साक्ष्य संरक्षण और रिकॉर्डिंग अनिवार्य है।","d":"मजिस्ट्रेट जांच मुकदमे की नींव है। निष्पक्षता, पारदर्शिता और साक्ष्य संरक्षण जांच की विश्वसनीयता के लिए आवश्यक हैं।"},
  {"s":"S4","n":"Arnesh Kumar v. State of Bihar","c":"(2014) 8 SCC 273","ctx":"गिरफ्तारी दिशा-निर्देश, धारा 41/41A CrPC","q":"क्या पुलिस को हर मामले में तुरंत गिरफ्तारी करनी चाहिए?","i":"क्या धारा 41 और 41A CrPC का सख्त पालन अनिवार्य है?","r":"रूटीन अरेस्ट अवैध है। अरेस्ट से पहले जांच, लिखित कारण और धारा 41A नोटिस अनिवार्य है। व्यक्तिगत स्वतंत्रता संरक्षित है।","d":"यह निर्णय पुलिस अरेस्ट प्रथा में क्रांतिकारी परिवर्तन लाता है। व्यक्तिगत स्वतंत्रता और पुलिस शक्तियों का संतुलन आवश्यक है।"},
  {"s":"S4","n":"Mohammed Ajmal Kasab v. State of Maharashtra","c":"AIR 2012 SC 3565","ctx":"आतंकवाद मामले, निष्पक्ष सुनवाई","q":"क्या सार्वजनिक दबाव न्यायिक निष्पक्षता को प्रभावित कर सकता है?","i":"क्या आतंकवाद आरोपियों को भी संवैधानिक अधिकार प्राप्त हैं?","r":"निष्पक्ष सुनवाई संविधान का मूल सिद्धांत है। सार्वजनिक दबाव या मीडिया प्रभाव न्यायिक प्रक्रिया को प्रभावित नहीं कर सकता।","d":"आतंकवाद मामले संवेदनशील होते हैं, किंतु निष्पक्ष सुनवाई का सिद्धांत सभी पर लागू होता है। संवैधानिक अधिकार किसी से नहीं छीने जा सकते।"},
  {"s":"S4","n":"P. Ramachandra Rao v. State of Karnataka","c":"(2012) 9 SCC 430","ctx":"Speedy Trial, विलंब निवारण","q":"क्या विलंब के कारणों का विश्लेषण और निवारण अनिवार्य है?","i":"क्या न्यायालय को विलंब कम करने के लिए प्रशासनिक उपाय अपनाने चाहिए?","r":"विलंब Article 21 का उल्लंघन है। न्यायालय को विलंब कम करने के लिए प्रशासनिक और न्यायिक उपाय अपनाने चाहिए।","d":"'Speedy Trial' मौलिक अधिकार है। विलंब आरोपी की स्वतंत्रता और न्यायिक प्रक्रिया की विश्वसनीयता को प्रभावित करता है। निवारण आवश्यक है।"},
  {"s":"S4","n":"State of U.P. v. Naresh","c":"(2011) 4 SCC 324","ctx":"गवाह संरक्षण, धमकी निवारण","q":"क्या गवाह संरक्षण कार्यक्रम की आवश्यकता संवैधानिक है?","i":"क्या धमकी या दबाव की स्थिति में सुरक्षा उपाय लागू किए जाने चाहिए?","r":"गवाह संरक्षण निष्पक्ष सुनवाई के लिए अनिवार्य है। धमकी या दबाव की स्थिति में सुरक्षा उपाय लागू किए जाने चाहिए।","d":"गवाह निष्पक्ष सुनवाई की रीढ़ हैं। उनकी सुरक्षा न्यायिक प्रक्रिया की विश्वसनीयता के लिए आवश्यक है। संरक्षण कार्यक्रम आवश्यक है।"},
  {"s":"S4","n":"Manu Sharma v. State (Nirbhaya Reference)","c":"(2010) 6 SCC 1","ctx":"परोक्ष साक्ष्य, कड़ी सिद्धांत","q":"क्या परोक्ष साक्ष्य की कड़ी अटूट और तर्कसंगत होनी चाहिए?","i":"क्या संदेह का लाभ हमेशा अभियुक्त को दिया जाना चाहिए?","r":"परोक्ष साक्ष्य में कड़ी सिद्धांत का सख्त पालन आवश्यक है। संदेह का लाभ हमेशा अभियुक्त को दिया जाना चाहिए।","d":"परोक्ष साक्ष्य में प्रत्येक कड़ी तर्कसंगत और प्रमाणित होनी चाहिए। कोई अंतराल या संदेह की स्थिति में लाभ अभियुक्त को देना न्यायिक सिद्धांत है।"},
  {"s":"S4","n":"Babubhai v. State of Gujarat","c":"(2010) 12 SCC 254","ctx":"पुनः जांच, न्यायिक निगरानी","q":"क्या पुनः जांच के लिए ठोस कारण और न्यायिक अनुमति आवश्यक है?","i":"क्या नए साक्ष्य, पक्षपात या गंभीर चूक की स्थिति में पुनः जांच संभव है?","r":"पुनः जांच केवल नए साक्ष्य, पक्षपात या गंभीर चूक की स्थिति में अनुमत है। न्यायिक निगरानी अनिवार्य है।","d":"पुनः जांच एक अपवादी उपाय है। केवल गंभीर कारणों और न्यायिक निगरानी में ही यह संभव है ताकि जांच अखंडता बनी रहे।"},
  {"s":"S4","n":"Nirmal Singh Kehlon v. State of Punjab","c":"(2009) 1 SCC 441","ctx":"CBI जांच, संघीय ढाँचा","q":"क्या CBI जांच के लिए राज्य सहमति या उच्चतम न्यायालय का आदेश अनिवार्य है?","i":"क्या न्यायिक निगरानी और पारदर्शिता अनिवार्य है?","r":"CBI जांच संघीय सहमति या न्यायिक आदेश से संभव है। न्यायिक निगरानी और पारदर्शिता अनिवार्य है।","d":"CBI जांच संघीय ढाँचे के अधीन है। राज्य सहमति या उच्चतम न्यायालय के आदेश के बिना जांच संवैधानिक रूप से चुनौतीपूर्ण हो सकती है।"},
  {"s":"S4","n":"Himanshu Singh Sabharwal v. State of M.P.","c":"AIR 2008 SC 1943","ctx":"गैर-जमानती अपराध, जमानत मानदंड","q":"क्या जमानत अस्वीकार करने के लिए विशिष्ट जोखिम प्रमाणित करना आवश्यक है?","i":"क्या उड़ने का खतरा, साक्ष्य छेड़छाड़ या समाज के लिए खतरा जमानत अस्वीकार करने का आधार है?","r":"गैर-जमानती मामलों में भी जमानत संभव है यदि उड़ने का खतरा, साक्ष्य छेड़छाड़ या समाज के लिए खतरा न हो।","d":"जमानत व्यक्तिगत स्वतंत्रता का हिस्सा है। गैर-जमानती अपराधों में भी जमानत संभव है यदि विशिष्ट जोखिम प्रमाणित न हो।"},
  {"s":"S4","n":"Sakiri Vasu v. State of U.P.","c":"(2008) 2 SCC 409","ctx":"मजिस्ट्रेट निगरानी, धारा 156(3) CrPC","q":"क्या मजिस्ट्रेट को निष्पक्ष जांच सुनिश्चित करने का दायित्व है?","i":"क्या मजिस्ट्रेट को जांच की प्रगति पर निगरानी रखनी चाहिए?","r":"मजिस्ट्रेट को जांच की निगरानी करनी चाहिए। निष्पक्ष जांच सुनिश्चित करना न्यायिक उत्तरदायित्व है।","d":"मजिस्ट्रेट जांच प्रक्रिया की निगरानी कर सकते हैं। यह निष्पक्ष जांच सुनिश्चित करने और दुरुपयोग रोकने का महत्वपूर्ण उपाय है।"},
  {"s":"S4","n":"Zahira Habibullah Sheikh v. State of Gujarat","c":"(2006) 3 SCC 374","ctx":"गवाह धमकी, निष्पक्ष सुनवाई","q":"क्या गवाह धमकी की स्थिति में मुकदमा स्थानांतरित किया जा सकता है?","i":"क्या विशेष जांच और संरक्षण अनिवार्य है?","r":"गवाह धमकी निष्पक्ष सुनवाई को दूषित करती है। मुकदमा स्थानांतरण, विशेष जांच और संरक्षण अनिवार्य है।","d":"गवाह सुरक्षा निष्पक्ष सुनवाई की पूर्व-शर्त है। धमकी या दबाव की स्थिति में मुकदमा स्थानांतरण और विशेष संरक्षण आवश्यक है।"},
  {"s":"S4","n":"Shingara Singh v. State of Haryana","c":"(2003) 12 SCC 758","ctx":"हिरासत मृत्यु, मुआवजा","q":"क्या हिरासत मृत्यु में स्वतंत्र जांच और मुआवजा अनिवार्य है?","i":"क्या तुरंत FIR और पोस्टमार्टम अनिवार्य है?","r":"हिरासत मृत्यु में तुरंत FIR, पोस्टमार्टम और स्वतंत्र जांच अनिवार्य है। राज्य मुआवजा देने के लिए बाध्य है।","d":"हिरासत मृत्यु गंभीर मानवाधिकार उल्लंघन है। तुरंत जांच, पोस्टमार्टम और मुआवजा राज्य का संवैधानिक कर्तव्य है।"},
  {"s":"S4","n":"Durga Datta Sharma v. State","c":"2003 SCC OnLine Gau 153","ctx":"जांच प्रक्रिया, धारा 154-173 CrPC","q":"क्या जांच अधिकारी की भूमिका निष्पक्ष और पारदर्शी होनी चाहिए?","i":"क्या पक्षपात, देरी या साक्ष्य छेड़छाड़ जांच को अमान्य बनाती है?","r":"जांच प्रक्रिया कानून के अनुसार होनी चाहिए। पक्षपात, देरी या साक्ष्य छेड़छाड़ जांच को अमान्य बनाती है।","d":"जांच प्रक्रिया निष्पक्ष, पारदर्शी और कानून के अनुसार होनी चाहिए। प्रक्रियात्मक चूक जांच की विश्वसनीयता को प्रभावित करती है।"},
  {"s":"S4","n":"D.K. Basu v. State of West Bengal","c":"(1997) 1 SCC 416","ctx":"हिरासत अधिकार, 11 नियम","q":"क्या सूचना, मेडिकल, वकील और रजिस्टर रखना अनिवार्य है?","i":"क्या उल्लंघन हिरासत को अवैध बनाता है?","r":"11 दिशा-निर्देश संवैधानिक हैं। उल्लंघन हिरासत को अवैध बनाता है। राज्य की निरपेक्ष जिम्मेदारी है।","d":"D.K. Basu के 11 नियम हिरासत में मानवाधिकार संरक्षण के लिए आधारभूत हैं। प्रत्येक नियम का पालन अनिवार्य है और उल्लंघन की स्थिति में राज्य निरपेक्ष जिम्मेदार है।"},
  {"s":"S4","n":"Nilabati Behera v. State of Odisha","c":"(1993) 2 SCC 746","ctx":"हिरासत मृत्यु, संवैधानिक मुआवजा","q":"क्या संवैधानिक उपचार के तहत मुआवजा दिया जा सकता है?","i":"क्या निरपेक्ष जिम्मेदारी लागू होती है?","r":"हिरासत मृत्यु में राज्य को संवैधानिक मुआवजा देना होगा। निरपेक्ष जिम्मेदारी लागू होती है।","d":"हिरासत मृत्यु मानवाधिकारों का गंभीर उल्लंघन है। राज्य को संवैधानिक उपचार के तहत मुआवजा देना होगा और निरपेक्ष जिम्मेदारी लागू होती है।"},
  {"s":"S4","n":"Abdul Rehman Antulay v. R.S. Nayak","c":"(1992) 1 SCC 225","ctx":"Speedy Trial, विलंब निवारण","q":"क्या विलंब Article 21 का उल्लंघन है?","i":"क्या न्यायालय को त्वरित सुनवाई सुनिश्चित करने के लिए प्रशासनिक उपाय अपनाने चाहिए?","r":"विलंब संवैधानिक अधिकारों का हनन है। न्यायालय को त्वरित सुनवाई सुनिश्चित करने के लिए प्रशासनिक उपाय अपनाने चाहिए।","d":"'Speedy Trial' Article 21 का अभिन्न अंग है। विलंब आरोपी की स्वतंत्रता और न्यायिक प्रक्रिया की विश्वसनीयता को प्रभावित करता है। निवारण आवश्यक है।"},
  {"s":"S4","n":"Sheela Barse v. Union of India","c":"(1986) 3 SCC 596","ctx":"बिना मुकदमे कैद, कानूनी सहायता","q":"क्या गरीब आरोपियों को मुफ्त कानूनी सहायता का अधिकार है?","i":"क्या जमानत और कानूनी सहायता संवैधानिक अधिकार हैं?","r":"'Speedy Trial' मौलिक अधिकार है। गरीब आरोपियों को मुफ्त कानूनी सहायता का अधिकार है।","d":"बिना मुकदमे लंबी हिरासत मानवाधिकार उल्लंघन है। गरीब आरोपियों को मुफ्त कानूनी सहायता और उचित जमानत प्रक्रिया का अधिकार है।"},
  {"s":"S4","n":"State of Maharashtra v. Champalal Punjabi Shah","c":"(1981) 3 SCC 610","ctx":"जमानत मानदंड","q":"क्या जमानत अस्वीकार करने के लिए ठोस कारण चाहिए?","i":"क्या व्यक्तिगत स्वतंत्रता प्राथमिक है?","r":"जमानत नियम है, अस्वीकार करना अपवाद। ठोस कारणों के बिना जमानत नहीं रोकी जा सकती।","d":"जमानत व्यक्तिगत स्वतंत्रता का हिस्सा है। अभियोजन को जमानत रोकने के लिए विशिष्ट और प्रमाणित जोखिम दिखाना होता है।"},
  {"s":"S4","n":"Hussainara Khatoon v. Home Secy. Bihar","c":"(1980) 1 SCC 81","ctx":"Speedy Trial, मुफ्त कानूनी सहायता","q":"क्या लंबित मुकदमों में मुफ्त वकील अनिवार्य है?","i":"क्या गरीब आरोपियों को न्याय मिलना चाहिए?","r":"हाँ, मुफ्त कानूनी सहायता Article 21 का हिस्सा है। राज्य बाध्य है।","d":"न्यायिक समानता के लिए कानूनी सहायता आवश्यक है। गरीब आरोपी बिना वकील के न्याय नहीं पा सकते।"},
  {"s":"S4","n":"Khatri v. State of Bihar","c":"(1981) 2 SCC 493","ctx":"गिरफ्तारी समय से कानूनी सहायता","q":"क्या गिरफ्तारी के तुरंत बाद वकील मिलने का अधिकार है?","i":"क्या पुलिस को सूचित करना चाहिए?","r":"गिरफ्तारी के समय से ही मुफ्त कानूनी सहायता का अधिकार शुरू हो जाता है।","d":"पुलिस को गिरफ्तारी के समय आरोपी को कानूनी सहायता के अधिकार के बारे में सूचित करना चाहिए।"},
  {"s":"S4","n":"Shyam Singh v. State of Rajasthan","c":"1973 Crl. LJ 441","ctx":"स्वीकारोक्ति और साक्ष्य","q":"क्या दबाव में ली गई स्वीकारोक्ति मान्य है?","i":"क्या स्वैच्छिकता सिद्ध करनी होगी?","r":"दबाव, प्रलोभन या धमकी में ली गई स्वीकारोक्ति अमान्य है। स्वैच्छिकता अनिवार्य है।","d":"स्वीकारोक्ति केवल तभी साक्ष्य हो सकती है जब वह पूरी तरह स्वैच्छिक हो। किसी भी प्रकार का प्रभाव साक्ष्य को दूषित करता है।"},
  {"s":"S4","n":"State of Uttar Pradesh v. Bhagwant Kishore Joshi","c":"AIR 1964 SC 221","ctx":"CrPC प्रक्रिया","q":"क्या प्रक्रियात्मक चूक मुकदमे को बाधित करती है?","i":"क्या न्यायालय को तकनीकीता पर ध्यान देना चाहिए?","r":"प्रक्रिया न्याय की सहायक है, बाधा नहीं। गंभीर चूक को छोड़कर तकनीकीता पर मुकदमा नहीं रोकना चाहिए।","d":"न्यायालय का उद्देश्य न्याय देना है, तकनीकी खामियाँ ढूँढना नहीं। प्रक्रियात्मक चूकें तभी घातक हैं जब वे निष्पक्ष सुनवाई को प्रभावित करें।"},

  {"s":"S5","n":"Nilesh Navalakha v. Union of India","c":"2021 SCC Online Bom 56","ctx":"मीडिया रिपोर्टिंग, जांच निगरानी","q":"क्या मीडिया रिपोर्टिंग जांच को प्रभावित कर सकती है?","i":"क्या न्यायिक निगरानी आवश्यक है?","r":"मीडिया रिपोर्टिंग पारदर्शिता बढ़ाती है, किंतु निष्पक्ष जांच को प्रभावित न करे। न्यायिक निगरानी आवश्यक है।","d":"मीडिया स्वतंत्रता और निष्पक्ष जांच दोनों महत्वपूर्ण हैं। संतुलन बनाए रखने के लिए न्यायिक निगरानी आवश्यक है।"},
  {"s":"S5","n":"Indo-Asian News Channel v. T.N. Suraj","c":"2022 SCC OnLine Ker 2710","ctx":"मानहानि, मीडिया जिम्मेदारी","q":"क्या सत्य और सार्वजनिक हित मानहानि से रक्षा करते हैं?","i":"क्या जिम्मेदार रिपोर्टिंग आवश्यक है?","r":"सत्य और सार्वजनिक हित मानहानि से रक्षा करते हैं, किंतु जिम्मेदार रिपोर्टिंग आवश्यक है।","d":"मीडिया को सत्य और सार्वजनिक हित में रिपोर्टिंग का अधिकार है, किंतु जिम्मेदारी के साथ। असत्यापित या हानिकारक रिपोर्टिंग मानहानि के अधीन हो सकती है।"},  {"s":"S5","n":"Venkatesh v. State of Karnataka","c":"2022 SCC OnLine SC 765","ctx":"लंबित मामले, मीडिया टिप्पणी","q":"क्या लंबित मामलों पर मीडिया टिप्पणी न्यायिक प्रक्रिया को प्रभावित कर सकती है?","i":"क्या 'Sub-judice' सिद्धांत लागू होता है?","r":"लंबित मामलों पर मीडिया टिप्पणी न्यायिक प्रक्रिया में हस्तक्षेप माना जा सकता है। 'Sub-judice' सिद्धांत का पालन आवश्यक है।","d":"'Sub-judice' सिद्धांत निष्पक्ष सुनवाई की रक्षा करता है। मीडिया को लंबित मामलों पर टिप्पणी करते समय सावधानी बरतनी चाहिए।"},
  {"s":"S5","n":"CEC v. M.R. Vijayabhaskar","c":"2021 SCC Online SC 364","ctx":"मीडिया स्वतंत्रता, न्यायिक पारदर्शिता","q":"क्या Article 19(1)(a) के तहत प्रेस स्वतंत्रता 'Open Court' सिद्धांत को सुदृढ़ करती है?","i":"क्या मीडिया रिपोर्टिंग न्यायिक प्रक्रिया में हस्तक्षेप कर सकती है?","r":"मीडिया को न्यायिक कार्यवाही रिपोर्ट करने का पूर्ण अधिकार है। पारदर्शिता लोकतंत्र की नींव है।","d":"'Open Court' सिद्धांत भारतीय संविधान के लोकतांत्रिक ढाँचे का अभिन्न अंग है। मीडिया रिपोर्टिंग पारदर्शिता बढ़ाती है, किंतु निष्पक्ष सुनवाई को प्रभावित न करे।"},
  {"s":"S5","n":"Vijay Singhal v. Govt. of NCT Delhi","c":"2013 SCC OnLine Del 1221","ctx":"अवमानना, मीडिया टिप्पणियाँ","q":"क्या आलोचना की स्वतंत्रता है?","i":"क्या न्यायिक गरिमा बनाए रखना आवश्यक है?","r":"आलोचना की स्वतंत्रता है, किंतु न्यायिक गरिमा बनाए रखना आवश्यक है। अवमानना कार्रवाई संभव है।","d":"मीडिया को न्यायिक प्रक्रिया की आलोचना का अधिकार है, किंतु गरिमा हानि या प्रक्रिया बाधा अवमानना के अधीन हो सकती है।"},
  {"s":"S5","n":"Sahara India v. SEBI","c":"(2012) 10 SCC 603","ctx":"Postponement Orders, निष्पक्ष सुनवाई","q":"क्या Article 19(1)(a) और Article 21 के बीच संघर्ष को Postponement Order से सुलझाया जा सकता है?","i":"क्या प्रतिबंध अस्थायी और अनुपातिक होना चाहिए?","r":"न्यायालय अस्थायी रूप से मीडिया रिपोर्टिंग रोक सकता है यदि यह निष्पक्ष सुनवाई को गंभीर रूप से प्रभावित करे। यह प्रतिबंध समयबद्ध, अनुपातिक और केवल अंतिम उपाय होना चाहिए।","d":"'Freedom of Press' और 'Right to Fair Trial' दोनों मौलिक अधिकार हैं। जब मीडिया रिपोर्टिंग गवाहों को प्रभावित करे या संवेदनशील साक्ष्य सार्वजनिक करे, तो अस्थायी प्रतिबंध लगाया जा सकता है।"},
  {"s":"S5","n":"R.K. Anand v. Registrar, Delhi HC","c":"(2009) 8 SCC 106","ctx":"Trial by Media, अवमानना","q":"क्या मीडिया द्वारा 'Trial' न्यायिक प्रक्रिया को प्रभावित कर सकता है?","i":"क्या अवमानना कार्रवाई उचित है?","r":"'Trial by Media' न्यायिक प्रक्रिया में हस्तक्षेप माना जा सकता है; अवमानना कार्रवाई संभव।","d":"मीडिया द्वारा पूर्व-निर्णय या 'Trial by Media' न्यायिक प्रक्रिया को दूषित कर सकता है। ऐसी स्थिति में अवमानना कार्रवाई उचित है।"},
  {"s":"S5","n":"Rajendra SAIL v. MP High Court Bar Association","c":"(2005) 6 SCC 109","ctx":"मीडिया रिपोर्टिंग, न्यायालय गरिमा","q":"क्या मीडिया रिपोर्टिंग न्यायिक गरिमा को प्रभावित कर सकती है?","i":"क्या संतुलन और जिम्मेदारी आवश्यक है?","r":"मीडिया रिपोर्टिंग और न्यायालय गरिमा के बीच संतुलन आवश्यक है। जिम्मेदार रिपोर्टिंग और सीमाएँ अनिवार्य हैं।","d":"मीडिया स्वतंत्रता और न्यायिक गरिमा दोनों महत्वपूर्ण हैं। संतुलन बनाए रखने के लिए जिम्मेदार रिपोर्टिंग और सीमाएँ आवश्यक हैं।"},
  {"s":"S5","n":"State of Maharashtra v. Rajendra Jawanmal Gandhi","c":"(1997) 8 SCC 386","ctx":"निष्पक्ष सुनवाई, प्रेस स्वतंत्रता","q":"क्या मीडिया स्वतंत्रता निष्पक्ष सुनवाई के अधिकार से टकरा सकती है?","i":"क्या न्यायालय संतुलन बनाए रखेगा?","r":"मीडिया स्वतंत्रता और निष्पक्ष सुनवाई का संघर्ष हो सकता है; न्यायालय संतुलन बनाए रखेगा।","d":"Article 19(1)(a) और Article 21 दोनों मौलिक अधिकार हैं। न्यायालय दोनों अधिकारों के बीच संतुलन बनाए रखेगा और निष्पक्ष सुनवाई को प्राथमिकता देगा।"},
  {"s":"S5","n":"Sushil Sharma v. State (Delhi Admn.)","c":"1996 SCC OnLine Del 345","ctx":"मीडिया प्रभाव, मुकदमा","q":"क्या मीडिया प्रभाव न्यायिक निष्पक्षता को प्रभावित कर सकता है?","i":"क्या पक्षपात रोकना आवश्यक है?","r":"मीडिया प्रभाव न्यायिक निष्पक्षता को प्रभावित कर सकता है। पक्षपात रोकना और निष्पक्ष सुनवाई सुनिश्चित करना आवश्यक है।","d":"मीडिया प्रभाव न्यायिक निष्पक्षता को प्रभावित कर सकता है। न्यायालय को पक्षपात रोकने और निष्पक्ष सुनवाई सुनिश्चित करने के उपाय अपनाने चाहिए।"},
  {"s":"S5","n":"Indian Express v. Union of India","c":"(1985) 1 SCC 641","ctx":"प्रेस स्वतंत्रता, संवैधानिक संरक्षण","q":"क्या प्रेस स्वतंत्रता संवैधानिक संरक्षण प्राप्त है?","i":"क्या जिम्मेदारी और सार्वजनिक हित आवश्यक है?","r":"प्रेस स्वतंत्रता संवैधानिक संरक्षण प्राप्त है, किंतु जिम्मेदारी और सार्वजनिक हित आवश्यक है।","d":"Article 19(1)(a) के तहत प्रेस स्वतंत्रता संरक्षित है, किंतु यह जिम्मेदारी और सार्वजनिक हित के साथ होनी चाहिए। असत्यापित या हानिकारक रिपोर्टिंग संरक्षण से बाहर हो सकती है।"},
  {"s":"S5","n":"PUCL v. State of Maharashtra","c":"2008 SCC OnLine SC","ctx":"एनकाउंटर मामले, मीडिया भूमिका","q":"क्या मीडिया एनकाउंटर जांच में पारदर्शिता बढ़ा सकता है?","i":"क्या मानवाधिकार संरक्षण आवश्यक है?","r":"मीडिया एनकाउंटर जांच में पारदर्शिता बढ़ा सकता है, किंतु मानवाधिकार संरक्षण आवश्यक है।","d":"एनकाउंटर मामले संवेदनशील होते हैं। मीडिया पारदर्शिता बढ़ा सकता है, किंतु मानवाधिकार संरक्षण और निष्पक्ष जांच प्राथमिक है।"},

  {"s":"S7","n":"Mohd. Arif v. State (NCT of Delhi)","c":"MANU/SC/1424/2022","ctx":"इलेक्ट्रॉनिक साक्ष्य, प्रमाणीकरण","q":"क्या इलेक्ट्रॉनिक साक्ष्य के लिए प्रमाणीकरण अनिवार्य है?","i":"क्या तकनीकी मानक और स्रोत विश्वसनीयता आवश्यक है?","r":"डिजिटल साक्ष्य की स्वीकार्यता के लिए प्रमाणीकरण, स्रोत विश्वसनीयता और तकनीकी मानक अनिवार्य हैं।","d":"इलेक्ट्रॉनिक साक्ष्य की विश्वसनीयता प्रमाणीकरण और तकनीकी मानकों पर निर्भर है। धारा 65B के तहत प्रमाणीकरण अनिवार्य है।"},
  {"s":"S7","n":"Ravinder Singh v. State of Punjab","c":"(2022) 7 SCC 581","ctx":"Section 65B प्रमाणपत्र","q":"क्या Section 65B प्रमाणपत्र अनिवार्य है?","i":"क्या वैकल्पिक प्रमाण संभव हैं?","r":"Section 65B प्रमाणपत्र आवश्यक है, किंतु मूल डिवाइस पेश करने पर वैकल्पिक प्रमाण संभव हैं।","d":"धारा 65B(4) के तहत प्रमाणपत्र अनिवार्य है, किंतु यदि मूल डिवाइस न्यायालय में पेश किया जाए तो प्रमाणपत्र वैकल्पिक हो सकता है।"},
  {"s":"S7","n":"Arjun Panditrao Khotkar v. Kailash Gorantyal","c":"(2020) 7 SCC 1","ctx":"Section 65B Complete Code","q":"क्या Section 65B(4) सर्टिफिकेट अनिवार्य है?","i":"क्या मूल डिवाइस पेश करने पर सर्टिफिकेट वैकल्पिक है?","r":"हाँ, Section 65B(4) एक 'Complete Code' है। सर्टिफिकेट अनिवार्य है, किंतु यदि मूल डिवाइस न्यायालय में पेश किया जाए तो सर्टिफिकेट की आवश्यकता नहीं।","d":"इस निर्णय ने Anvar PV (2014) के सिद्धांत को स्पष्ट और सुदृढ़ किया। इलेक्ट्रॉनिक साक्ष्य (CD, DVD, WhatsApp, Email, CDR) को धारा 65B के तहत ही स्वीकार किया जाएगा।"},
  {"s":"S7","n":"P. Gopalkrishnan v. State of Kerala","c":"(2020) 9 SCC 161","ctx":"डिजिटल साक्ष्य संरक्षण","q":"क्या चेन ऑफ कस्टडी और हैश वैल्यू अनिवार्य हैं?","i":"क्या तकनीकी प्रमाणीकरण आवश्यक है?","r":"डिजिटल साक्ष्य संरक्षण के लिए चेन ऑफ कस्टडी, हैश वैल्यू और तकनीकी प्रमाणीकरण अनिवार्य हैं।","d":"डिजिटल साक्ष्य की अखंडता चेन ऑफ कस्टडी और हैश वैल्यू पर निर्भर है। तकनीकी प्रमाणीकरण साक्ष्य की विश्वसनीयता सुनिश्चित करता है।"},
  {"s":"S7","n":"Virendra Khanna v. State of Karnataka","c":"2021 SCC OnLine Kar 5032","ctx":"इलेक्ट्रॉनिक उपकरण जब्ती","q":"क्या जब्ती प्रक्रिया में डेटा सुरक्षा और गोपनीयता अनिवार्य है?","i":"क्या वैध प्रक्रिया और न्यायिक अनुमति आवश्यक है?","r":"इलेक्ट्रॉनिक उपकरण जब्ती में वैध प्रक्रिया, डेटा सुरक्षा और गोपनीयता अनिवार्य है। न्यायिक अनुमति आवश्यक है।","d":"इलेक्ट्रॉनिक उपकरण जब्ती में डेटा सुरक्षा और गोपनीयता महत्वपूर्ण है। वैध प्रक्रिया और न्यायिक अनुमति के बिना जब्ती अमान्य हो सकती है।"},
  {"s":"S7","n":"State by Karnataka Lokayukta v. M.R. Hiremath","c":"(2019) 7 SCC 515","ctx":"भ्रष्टाचार मामलों में डिजिटल साक्ष्य","q":"क्या ईमेल और ऑडियो-वीडियो साक्ष्य के रूप में स्वीकार्य हैं?","i":"क्या प्रमाणीकरण प्रक्रिया का पालन अनिवार्य है?","r":"ईमेल, ऑडियो-वीडियो रिकॉर्डिंग को साक्ष्य के रूप में स्वीकार करने के लिए प्रमाणीकरण प्रक्रिया का पालन अनिवार्य है।","d":"भ्रष्टाचार मामलों में डिजिटल साक्ष्य महत्वपूर्ण हैं। धारा 65B के तहत प्रमाणीकरण और चेन ऑफ कस्टडी अनिवार्य है।"},
  {"s":"S7","n":"Shamsher Singh Verma v. State of Haryana","c":"(2016) 15 SCC 485","ctx":"माध्यमिक इलेक्ट्रॉनिक साक्ष्य","q":"क्या मूल अनुपलब्ध होने पर माध्यमिक साक्ष्य स्वीकार्य हैं?","i":"क्या स्वीकार्यता की शर्तें पूरी होनी चाहिए?","r":"मूल अनुपलब्ध होने पर माध्यमिक इलेक्ट्रॉनिक साक्ष्य स्वीकार्य हैं, किंतु स्वीकार्यता की शर्तें पूरी होनी चाहिए।","d":"माध्यमिक साक्ष्य केवल तभी स्वीकार्य हैं जब मूल अनुपलब्ध हो और स्वीकार्यता की शर्तें पूरी हों। प्रमाणीकरण और विश्वसनीयता अनिवार्य है।"},
  {"s":"S7","n":"Anvar PV v. P.K. Basheer","c":"(2014) 10 SCC 473","ctx":"इलेक्ट्रॉनिक रिकॉर्ड स्वीकार्यता","q":"क्या बिना सर्टिफिकेट के इलेक्ट्रॉनिक साक्ष्य स्वीकार्य हैं?","i":"क्या धारा 65B पूर्ण कोड है?","r":"Section 65B एक 'Complete Code' है; बिना सर्टिफिकेट के इलेक्ट्रॉनिक साक्ष्य अस्वीकार्य।","d":"यह निर्णय डिजिटल युग में साक्ष्य कानून का आधारभूत निर्णय है। धारा 65B के तहत प्रमाणीकरण अनिवार्य है और बिना सर्टिफिकेट के साक्ष्य अस्वीकार्य हैं।"},
  {"s":"S7","n":"Gajraj v. State (NCT of Delhi)","c":"(2011) 10 SCC 675","ctx":"कॉल डिटेल्स रिकॉर्ड","q":"क्या CDR साक्ष्य के रूप में स्वीकार्य हैं?","i":"क्या गोपनीयता और प्रासंगिकता अनिवार्य है?","r":"कॉल डिटेल्स रिकॉर्ड साक्ष्य के रूप में स्वीकार्य हैं, किंतु गोपनीयता और प्रासंगिकता अनिवार्य है।","d":"CDR साक्ष्य के रूप में स्वीकार्य हैं, किंतु गोपनीयता संरक्षण और प्रासंगिकता प्रमाणित होनी चाहिए। धारा 65B के तहत प्रमाणीकरण आवश्यक है।"},

  {"s":"S8","n":"Rahul v. State (NCT of Delhi)","c":"(2023) 1 SCC 83","ctx":"DNA साक्ष्य","q":"क्या डीएनए साक्ष्य की विश्वसनीयता प्रमाणित होनी चाहिए?","i":"क्या 'Match Probability' की व्याख्या आवश्यक है?","r":"डीएनए साक्ष्य की विश्वसनीयता संग्रह, विश्लेषण और रिपोर्टिंग मानकों पर निर्भर है। 'Match Probability' की स्पष्ट व्याख्या आवश्यक है।","d":"डीएनए साक्ष्य वैज्ञानिक और विश्वसनीय है, किंतु उचित संग्रह, विश्लेषण और रिपोर्टिंग अनिवार्य है।"},
  {"s":"S8","n":"Ashok Kumar v. Raj Gupta","c":"(2022) 1 SCC 20","ctx":"फोरेंसिक रिपोर्ट विश्वसनीयता","q":"क्या फोरेंसिक रिपोर्ट की विश्वसनीयता प्रमाणित होनी चाहिए?","i":"क्या प्रयोगशाला मानक और विशेषज्ञ योग्यता अनिवार्य है?","r":"फोरेंसिक रिपोर्ट विश्वसनीयता प्रयोगशाला मानक, विशेषज्ञ योग्यता और पारदर्शिता पर निर्भर है।","d":"फोरेंसिक रिपोर्ट की विश्वसनीयता प्रयोगशाला मानकों, विशेषज्ञ योग्यता और पारदर्शी प्रक्रिया पर निर्भर है।"},
  {"s":"S8","n":"Ashok Kumar Chandel v. State of UP","c":"2022 SCC OnLine SC 1525","ctx":"चिकित्सा साक्ष्य","q":"क्या पोस्टमार्टम रिपोर्ट और चोट विश्लेषण विश्वसनीय होना चाहिए?","i":"क्या कारण-प्रभाव संबंध प्रमाणित होना चाहिए?","r":"चिकित्सा साक्ष्य में पोस्टमार्टम रिपोर्ट, चोट विश्लेषण और कारण-प्रभाव संबंध विश्वसनीय और प्रमाणित होना चाहिए।","d":"चिकित्सा साक्ष्य मुकदमे में महत्वपूर्ण हैं। पोस्टमार्टम रिपोर्ट, चोट विश्लेषण और कारण-प्रभाव संबंध स्पष्ट और विश्वसनीय होना चाहिए।"},
  {"s":"S8","n":"Veerendra v. State of Madhya Pradesh","c":"2022 SCC OnLine SC 622","ctx":"फिंगरप्रिंट साक्ष्य","q":"क्या फिंगरप्रिंट साक्ष्य की विश्वसनीयता प्रमाणित होनी चाहिए?","i":"क्या तकनीकी मानक और तुलना प्रक्रिया अनिवार्य है?","r":"फिंगरप्रिंट साक्ष्य की विश्वसनीयता संग्रह, तुलना और तकनीकी मानकों पर निर्भर है।","d":"फिंगरप्रिंट साक्ष्य वैज्ञानिक है, किंतु उचित संग्रह, तुलना और तकनीकी मानक अनिवार्य है।"},
  {"s":"S8","n":"Inayath Ali v. State of Telangana","c":"SLP(Crl) No. 4946/2017","ctx":"बैलिस्टिक साक्ष्य","q":"क्या बैलिस्टिक साक्ष्य की विश्वसनीयता प्रमाणित होनी चाहिए?","i":"क्या विशेषज्ञ राय और तुलना प्रक्रिया अनिवार्य है?","r":"बैलिस्टिक साक्ष्य की विश्वसनीयता हथियार पहचान, गोली मिलान और विशेषज्ञ राय पर निर्भर है।","d":"बैलिस्टिक साक्ष्य हथियार और गोली मिलान में महत्वपूर्ण हैं। विशेषज्ञ राय और तुलना प्रक्रिया विश्वसनीय और प्रमाणित होनी चाहिए।"},
  {"s":"S8","n":"Hari Om v. State of Uttar Pradesh","c":"(2021) 4 SCC 345","ctx":"फोरेंसिक राय","q":"क्या फोरेंसिक राय बाध्यकारी है?","i":"क्या न्यायालय स्वतंत्र मूल्यांकन कर सकता है?","r":"फोरेंसिक राय बाध्यकारी नहीं, सहायक है; न्यायालय स्वतंत्र मूल्यांकन करेगा।","d":"फोरेंसिक राय विशेषज्ञ ज्ञान पर आधारित है, किंतु बाध्यकारी नहीं है। न्यायालय सभी साक्ष्यों का स्वतंत्र मूल्यांकन करेगा।"},
  {"s":"S8","n":"Chunthuram v. State of Chhattisgarh","c":"(2020) 10 SCC 733","ctx":"विष विज्ञान रिपोर्ट","q":"क्या विष विज्ञान रिपोर्ट की विश्वसनीयता प्रमाणित होनी चाहिए?","i":"क्या नमूना संग्रह और प्रयोगशाला प्रक्रिया अनिवार्य है?","r":"विष विज्ञान रिपोर्ट की विश्वसनीयता नमूना संग्रह, प्रयोगशाला प्रक्रिया और रिपोर्टिंग मानकों पर निर्भर है।","d":"विष विज्ञान रिपोर्ट महत्वपूर्ण साक्ष्य है। नमूना संग्रह, प्रयोगशाला प्रक्रिया और रिपोर्टिंग मानक विश्वसनीय और प्रमाणित होना चाहिए।"},
  {"s":"S8","n":"Pattu Rajan v. State of Tamil Nadu","c":"(2019) 4 SCC 771","ctx":"हस्तलेख विश्लेषण","q":"क्या हस्तलेख विशेषज्ञ राय विश्वसनीय है?","i":"क्या तुलनात्मक नमूने और सीमाएँ अनिवार्य है?","r":"हस्तलेख विश्लेषण विशेषज्ञ राय पर आधारित है, किंतु तुलनात्मक नमूने और सीमाएँ अनिवार्य हैं।","d":"हस्तलेख विश्लेषण विशेषज्ञ ज्ञान पर आधारित है। तुलनात्मक नमूने, विश्लेषण प्रक्रिया और सीमाएँ स्पष्ट होनी चाहिए।"},
  {"s":"S8","n":"Chennadi Japapathi Reddy v. Baddam Pratapa Reddy","c":"(2019) 14 SCC 220","ctx":"दीवानी मामलों में फोरेंसिक साक्ष्य","q":"क्या दीवानी मामलों में फोरेंसिक साक्ष्य स्वीकार्य हैं?","i":"क्या दस्तावेज़ प्रमाणीकरण और विशेषज्ञ राय अनिवार्य है?","r":"दीवानी मामलों में फोरेंसिक साक्ष्य स्वीकार्य हैं, किंतु दस्तावेज़ प्रमाणीकरण और विशेषज्ञ राय अनिवार्य है।","d":"दीवानी मामलों में दस्तावेज़ प्रमाणीकरण महत्वपूर्ण है। फोरेंसिक साक्ष्य और विशेषज्ञ राय विश्वसनीय और प्रमाणित होनी चाहिए।"},
  {"s":"S8","n":"Rajendra Wasnik v. State of Maharashtra","c":"(2019) 12 SCC 460","ctx":"बलात्कार मामलों में फोरेंसिक","q":"क्या बलात्कार मामलों में फोरेंसिक साक्ष्य विशेष संवेदनशीलता के साथ संरक्षित होने चाहिए?","i":"क्या पीड़िता सम्मान और गोपनीयता अनिवार्य है?","r":"बलात्कार मामलों में फोरेंसिक साक्ष्य विशेष संवेदनशीलता के साथ संरक्षित होने चाहिए। पीड़िता सम्मान और गोपनीयता अनिवार्य है।","d":"बलात्कार मामलों में फोरेंसिक साक्ष्य महत्वपूर्ण हैं। मेडिको-लीगल परीक्षण, साक्ष्य संरक्षण और पीड़िता सम्मान अनिवार्य है।"},
  {"s":"S8","n":"Ritesh Sinha v. State of UP","c":"2019 SCC OnLine SC 956","ctx":"आवाज़ नमूना","q":"क्या आवाज़ नमूना साक्ष्य के रूप में स्वीकार्य है?","i":"क्या स्वैच्छिकता और प्रक्रिया अनिवार्य है?","r":"आवाज़ नमूना साक्ष्य के रूप में स्वीकार्य है, किंतु स्वैच्छिकता और प्रक्रिया अनिवार्य है।","d":"आवाज़ नमूना वैज्ञानिक साक्ष्य है, किंतु स्वैच्छिक सहमति और उचित प्रक्रिया अनिवार्य है।"},
  {"s":"S8","n":"Rohtas v. State of Haryana","c":"(2019) 10 SCC 554","ctx":"फोरेंसिक साक्ष्य और पुष्टि","q":"क्या फोरेंसिक साक्ष्य अन्य साक्ष्यों के साथ संगत होना चाहिए?","i":"क्या पुष्टि और संगतता अनिवार्य है?","r":"फोरेंसिक साक्ष्य प्रत्यक्ष/परोक्ष साक्ष्य के साथ संगत होना चाहिए। पुष्टि और संगतता विश्वसनीयता बढ़ाती है।","d":"फोरेंसिक साक्ष्य अन्य साक्ष्यों के साथ संगत होना चाहिए। पुष्टि और संगतता साक्ष्य की विश्वसनीयता और मुकदमे की वैधता बढ़ाती है।"},
  {"s":"S8","n":"Mukesh v. State (NCT of Delhi)","c":"(2017) 6 SCC 1","ctx":"DNA और फोरेंसिक पुष्टि","q":"क्या गंभीर अपराधों में फोरेंसिक साक्ष्य विशेष महत्व रखते हैं?","i":"क्या उचित संग्रह प्रक्रिया और विश्वसनीयता अनिवार्य है?","r":"फोरेंसिक साक्ष्य की विश्वसनीयता और उचित संग्रह प्रक्रिया गंभीर अपराधों में विशेष महत्व रखती है।","d":"निरभया मामले में फोरेंसिक साक्ष्य (DNA, फिंगरप्रिंट) ने महत्वपूर्ण भूमिका निभाई। उचित संग्रह, प्रमाणीकरण और विश्वसनीयता अनिवार्य है।"},
  {"s":"S8","n":"S.P.S. Rathore v. CBI","c":"(2017) 5 SCC 817","ctx":"फोरेंसिक रिपोर्ट में विलंब","q":"क्या फोरेंसिक रिपोर्ट में विलंब विश्वसनीयता को प्रभावित करता है?","i":"क्या न्यायिक मूल्यांकन आवश्यक है?","r":"फोरेंसिक रिपोर्ट में विलंब विश्वसनीयता को प्रभावित कर सकता है। न्यायिक मूल्यांकन और कारण विश्लेषण आवश्यक है।","d":"फोरेंसिक रिपोर्ट में विलंब साक्ष्य की विश्वसनीयता को प्रभावित कर सकता है। न्यायालय को विलंब के कारण और प्रभाव का मूल्यांकन करना चाहिए।"},
  {"s":"S8","n":"Machindra v. Sajjan Gafla","c":"(2017) 13 SCC 491","ctx":"हत्या मामलों में फोरेंसिक","q":"क्या हत्या मामलों में फोरेंसिक साक्ष्य विशेष महत्व रखते हैं?","i":"क्या घटनास्थल जांच और साक्ष्य संग्रह अनिवार्य है?","r":"हत्या मामलों में फोरेंसिक साक्ष्य विशेष महत्व रखते हैं। घटनास्थल जांच, साक्ष्य संग्रह और विशेषज्ञ राय अनिवार्य है।","d":"हत्या मामलों में फोरेंसिक साक्ष्य महत्वपूर्ण हैं। घटनास्थल जांच, साक्ष्य संग्रह, चेन ऑफ कस्टडी और विशेषज्ञ राय विश्वसनीय और प्रमाणित होनी चाहिए।"},
  {"s":"S8","n":"Nandlal Badwaik v. Lata Badwaik","c":"(2014) 2 SCC 576","ctx":"DNA टेस्ट और पैतृत्व","q":"क्या डीएनए टेस्ट वैधानिक धारणा को खंडित कर सकता है?","i":"क्या बाल हित प्राथमिक है?","r":"Section 112 Evidence Act (Legitimacy Presumption) को DNA टेस्ट से खंडित किया जा सकता है; 'Science over Presumption'; बाल हित प्राथमिक।","d":"यह निर्णय वैज्ञानिक साक्ष्य और वैधानिक धारणा के बीच संतुलन स्थापित करता है। डीएनए टेस्ट वैधानिक धारणा को खंडित कर सकता है, किंतु बाल हित प्राथमिक है।"},
  {"s":"S8","n":"Sushil Sharma v. State (NCT of Delhi)","c":"(2014) 4 SCC 317","ctx":"फोरेंसिक साक्ष्य मूल्यांकन","q":"क्या फोरेंसिक साक्ष्य मूल्यांकन में विशेषज्ञ योग्यता और प्रक्रिया अनिवार्य है?","i":"क्या निष्कर्ष की तर्कसंगतता प्रमाणित होनी चाहिए?","r":"फोरेंसिक साक्ष्य मूल्यांकन में विशेषज्ञ योग्यता, प्रक्रिया और निष्कर्ष की तर्कसंगतता अनिवार्य है।","d":"फोरेंसिक साक्ष्य मूल्यांकन में विशेषज्ञ योग्यता, उचित प्रक्रिया और तर्कसंगत निष्कर्ष अनिवार्य है। न्यायालय स्वतंत्र मूल्यांकन कर सकता है।"},
  {"s":"S8","n":"Anil v. State of Maharashtra","c":"(2014) 4 SCC 69","ctx":"रासायनिक विश्लेषण रिपोर्ट","q":"क्या रासायनिक विश्लेषण रिपोर्ट साक्ष्य के रूप में स्वीकार्य है?","i":"क्या नमूना संग्रह और प्रयोगशाला प्रक्रिया अनिवार्य है?","r":"रासायनिक विश्लेषण रिपोर्ट साक्ष्य के रूप में स्वीकार्य है, किंतु नमूना संग्रह, प्रयोगशाला प्रक्रिया और रिपोर्टिंग अनिवार्य है।","d":"रासायनिक विश्लेषण रिपोर्ट महत्वपूर्ण साक्ष्य है। नमूना संग्रह, प्रयोगशाला प्रक्रिया और रिपोर्टिंग मानक विश्वसनीय और प्रमाणित होना चाहिए।"},
  {"s":"S8","n":"Dharam Deo Yadav v. State of UP","c":"(2014) 5 SCC 509","ctx":"फोरेंसिक साक्ष्य श्रृंखला","q":"क्या चेन ऑफ कस्टडी अनिवार्य है?","i":"क्या साक्ष्य अखंडता प्रमाणित होनी चाहिए?","r":"फोरेंसिक साक्ष्य श्रृंखला में चेन ऑफ कस्टडी अनिवार्य है। साक्ष्य अखंडता प्रमाणित होनी चाहिए।","d":"फोरेंसिक साक्ष्य की अखंडता चेन ऑफ कस्टडी पर निर्भर है। संग्रह से न्यायालय तक प्रत्येक चरण में अखंडता प्रमाणित होनी चाहिए।"},
  {"s":"S8","n":"State of Gujarat v. Kishanbhai","c":"(2014) 5 SCC 108","ctx":"बलात्कार मामलों में फोरेंसिक","q":"क्या बलात्कार मामलों में फोरेंसिक साक्ष्य विशेष संवेदनशीलता के साथ संरक्षित होने चाहिए?","i":"क्या मेडिकल परीक्षण और डीएनए विश्लेषण अनिवार्य है?","r":"बलात्कार मामलों में फोरेंसिक साक्ष्य विशेष संवेदनशीलता के साथ संरक्षित होने चाहिए। मेडिकल परीक्षण, डीएनए और साक्ष्य संरक्षण अनिवार्य है।","d":"बलात्कार मामलों में फोरेंसिक साक्ष्य महत्वपूर्ण हैं। मेडिकल परीक्षण, डीएनए विश्लेषण, साक्ष्य संरक्षण और पीड़िता सम्मान अनिवार्य है।"},
  {"s":"S8","n":"Manjit Singh v. State of Punjab","c":"(2013) 12 SCC 746","ctx":"विशेषज्ञ साक्ष्य","q":"क्या विशेषज्ञ साक्ष्य बाध्यकारी है?","i":"क्या न्यायालय अंतिम निर्णायक है?","r":"विशेषज्ञ साक्ष्य: योग्यता, निष्पक्षता, राय की सीमाएँ; न्यायालय अंतिम निर्णायक।","d":"विशेषज्ञ साक्ष्य विशेषज्ञ ज्ञान पर आधारित है, किंतु बाध्यकारी नहीं है। न्यायालय सभी साक्ष्यों का स्वतंत्र मूल्यांकन करेगा और अंतिम निर्णायक है।"},
  {"s":"S8","n":"Gangabhavani v. Rayapati Venkat Reddy","c":"(2013) 15 SCC 298","ctx":"दीवानी मामलों में फोरेंसिक साक्ष्य","q":"क्या दीवानी मामलों में फोरेंसिक साक्ष्य स्वीकार्य हैं?","i":"क्या दस्तावेज़ प्रमाणीकरण और विशेषज्ञ राय अनिवार्य है?","r":"दीवानी मामलों में फोरेंसिक साक्ष्य स्वीकार्य हैं, किंतु दस्तावेज़ प्रमाणीकरण, विशेषज्ञ राय और मूल्यांकन अनिवार्य है।","d":"दीवानी मामलों में दस्तावेज़ प्रमाणीकरण महत्वपूर्ण है। फोरेंसिक साक्ष्य, विशेषज्ञ राय और न्यायिक मूल्यांकन विश्वसनीय और प्रमाणित होना चाहिए।"},
  {"s":"S8","n":"Nupur Talvar v. CBI (Aarushi Case)","c":"(2012) 11 SCC 465","ctx":"फोरेंसिक साक्ष्य मूल्यांकन","q":"क्या फोरेंसिक साक्ष्य में विसंगतियाँ विश्वसनीयता को प्रभावित करती हैं?","i":"क्या संदेह का लाभ अभियुक्त को दिया जाना चाहिए?","r":"फोरेंसिक साक्ष्य मूल्यांकन में विसंगतियाँ, विश्वसनीयता और संदेह का लाभ महत्वपूर्ण हैं। संदेह का लाभ अभियुक्त को दिया जाना चाहिए।","d":"फोरेंसिक साक्ष्य मूल्यांकन में विसंगतियाँ विश्वसनीयता को प्रभावित कर सकती हैं। संदेह की स्थिति में लाभ अभियुक्त को देना न्यायिक सिद्धांत है।"},
  {"s":"S8","n":"Dayal Singh v. State of Uttarakhand","c":"(2012) 8 SCC 263","ctx":"फोरेंसिक रिपोर्ट में विलंब","q":"क्या फोरेंसिक रिपोर्ट में विलंब विश्वसनीयता को प्रभावित करता है?","i":"क्या न्यायिक दृष्टिकोण आवश्यक है?","r":"फोरेंसिक रिपोर्ट में विलंब विश्वसनीयता को प्रभावित कर सकता है। न्यायिक दृष्टिकोण और कारण विश्लेषण आवश्यक है।","d":"फोरेंसिक रिपोर्ट में विलंब साक्ष्य की विश्वसनीयता को प्रभावित कर सकता है। न्यायालय को विलंब के कारण और प्रभाव का मूल्यांकन करना चाहिए।"},
  {"s":"S8","n":"Surendra Koli v. State of UP","c":"(2011) 4 SCC 80","ctx":"सीरियल अपराधों में फोरेंसिक","q":"क्या सीरियल अपराधों में फोरेंसिक साक्ष्य विशेष महत्व रखते हैं?","i":"क्या पैटर्न विश्लेषण और साक्ष्य लिंकिंग अनिवार्य है?","r":"सीरियल अपराधों में फोरेंसिक साक्ष्य विशेष महत्व रखते हैं। पैटर्न विश्लेषण, डीएनए और साक्ष्य लिंकिंग अनिवार्य है।","d":"सीरियल अपराधों में फोरेंसिक साक्ष्य महत्वपूर्ण हैं। पैटर्न विश्लेषण, डीएनए मिलान और साक्ष्य लिंकिंग विश्वसनीय और प्रमाणित होनी चाहिए।"},
  {"s":"S8","n":"Santosh Kumar Singh v. State","c":"(2010) 9 SCC 747","ctx":"परोक्ष और फोरेंसिक साक्ष्य","q":"क्या परोक्ष और फोरेंसिक साक्ष्य का संयोजन विश्वसनीयता बढ़ाता है?","i":"क्या कड़ी सिद्धांत और तर्कसंगत निष्कर्ष अनिवार्य है?","r":"परोक्ष और फोरेंसिक साक्ष्य का संयोजन विश्वसनीयता बढ़ाता है। कड़ी सिद्धांत और तर्कसंगत निष्कर्ष अनिवार्य है।","d":"परोक्ष और फोरेंसिक साक्ष्य का संयोजन मुकदमे की विश्वसनीयता बढ़ाता है। कड़ी सिद्धांत, तर्कसंगत विश्लेषण और निष्कर्ष अनिवार्य है।"},
  {"s":"S8","n":"Selvi v. State of Karnataka","c":"(2010) 7 SCC 263","ctx":"अनैच्छिक वैज्ञानिक परीक्षण","q":"क्या बिना स्वैच्छिक सहमति के वैज्ञानिक परीक्षण संवैधानिक अधिकारों का उल्लंघन है?","i":"क्या ऐसे परीक्षणों से प्राप्त बयान साक्ष्य के रूप में स्वीकार्य हैं?","r":"बिना सहमति के वैज्ञानिक परीक्षण Article 20(3) (Self-incrimination) और Article 21 का उल्लंघन है। ऐसे बयान साक्ष्य के रूप में अस्वीकार्य हैं।","d":"मानसिक गोपनीयता और आत्म-सुरक्षा का अधिकार मौलिक है। नार्को-एनालिसिस, पॉलीग्राफ और BEAP परीक्षण मस्तिष्क की निष्क्रिय प्रतिक्रियाओं को रिकॉर्ड करते हैं, जो 'Testimony' के बराबर हैं।"},  {"s":"S8","n":"Bhabani Prasad Jena v. Orissa State Commission","c":"(2010) 8 SCC 633","ctx":"दीवानी मामलों में डीएनए टेस्ट","q":"क्या दीवानी मामलों में डीएनए टेस्ट संभव है?","i":"क्या सहमति और बाल हित अनिवार्य है?","r":"दीवानी मामलों में डीएनए टेस्ट संभव है, किंतु सहमति, बाल हित और न्यायिक विवेक अनिवार्य है।","d":"दीवानी मामलों में डीएनए टेस्ट संभव है, किंतु पक्षकारों की सहमति, बाल हित और न्यायिक विवेक अनिवार्य है। न्यायालय स्वतंत्र मूल्यांकन करेगा।"},
  {"s":"S8","n":"Ghurey Lal v. State of UP","c":"(2008) 10 SCC 450","ctx":"फोरेंसिक साक्ष्य विश्वसनीयता","q":"क्या फोरेंसिक साक्ष्य की विश्वसनीयता प्रमाणित होनी चाहिए?","i":"क्या प्रयोगशाला मानक और विशेषज्ञ योग्यता अनिवार्य है?","r":"फोरेंसिक साक्ष्य विश्वसनीयता प्रयोगशाला मानक, विशेषज्ञ योग्यता और प्रक्रिया पर निर्भर है।","d":"फोरेंसिक साक्ष्य की विश्वसनीयता प्रयोगशाला मानकों, विशेषज्ञ योग्यता और उचित प्रक्रिया पर निर्भर है। न्यायालय स्वतंत्र मूल्यांकन कर सकता है।"},
  {"s":"S8","n":"Banarsi Dass v. Teeku Dutta","c":"(2005) 4 SCC 449","ctx":"हस्तलेख विशेषज्ञ राय","q":"क्या हस्तलेख विशेषज्ञ राय विश्वसनीय है?","i":"क्या न्यायालय स्वतंत्र मूल्यांकन कर सकता है?","r":"हस्तलेख विशेषज्ञ राय: तुलनात्मक नमूने, विधि, सीमाएँ; न्यायालय स्वतंत्र मूल्यांकन।","d":"हस्तलेख विश्लेषण विशेषज्ञ ज्ञान पर आधारित है, किंतु बाध्यकारी नहीं है। तुलनात्मक नमूने, विश्लेषण प्रक्रिया और सीमाएँ स्पष्ट होनी चाहिए। न्यायालय स्वतंत्र मूल्यांकन करेगा।"},
  {"s":"S8","n":"Goutum Kundu v. State of West Bengal","c":"(1993) 3 SCC 418","ctx":"पैतृत्व विवाद","q":"क्या पैतृत्व विवाद में डीएनए साक्ष्य स्वीकार्य है?","i":"क्या बाल हित प्राथमिक है?","r":"पैतृत्व विवाद: साक्ष्य मानक, डीएनए (उपलब्ध होने पर), बाल हित। बाल हित प्राथमिक है।","d":"पैतृत्व विवाद में साक्ष्य मानक और डीएनए (यदि उपलब्ध हो) महत्वपूर्ण हैं, किंतु बाल हित प्राथमिक है। न्यायालय बाल हित को प्राथमिकता देगा।"},
  {"s":"S8","n":"State of Bombay v. Kathi Kalu Oghad","c":"1961 SCC OnLine SC 74","ctx":"आत्म-अपराधीकरण और साक्ष्य","q":"क्या अंगूठा निशान और आवाज़ नमूना Article 20(3) के अधीन हैं?","i":"क्या आत्म-अपराधीकरण से सुरक्षा लागू होती है?","r":"Article 20(3): आत्म-अपराधीकरण से सुरक्षा; अंगूठा निशान, आवाज़ नमूना आदि की सीमाएँ।","d":"Article 20(3) आत्म-अपराधीकरण से सुरक्षा प्रदान करता है। अंगूठा निशान, आवाज़ नमूना आदि 'Testimony' नहीं माने जाते, किंतु नार्को/पॉलीग्राफ परीक्षण आत्म-अपराधीकरण के अधीन हो सकते हैं।"},

  {"s":"S9","n":"Union of India v. Ex. Lt. Selina John","c":"C.A. No.-001990 – 2019 Order Dated Feb 14, 2024","ctx":"सशस्त्र बलों में महिला अधिकारियों के अधिकार","q":"क्या सशस्त्र बलों में महिला अधिकारियों को समान पदोन्नति और अवसर मिलने चाहिए?","i":"क्या भेदभाव निवारण अनिवार्य है?","r":"सशस्त्र बलों में महिला अधिकारियों को समान पदोन्नति, अवसर और भेदभाव निवारण का अधिकार है।","d":"सशस्त्र बलों में लिंग समानता संवैधानिक मूल्य है। महिला अधिकारियों को पुरुष समकक्षों के समान पदोन्नति, अवसर और कार्यस्थल सुरक्षा का अधिकार है।"},
  {"s":"S9","n":"X v. Union of India","c":"2023 INSC 919","ctx":"प्रजनन अधिकार, गोपनीयता","q":"क्या प्रजनन अधिकार मौलिक अधिकार है?","i":"क्या गोपनीयता और महिला स्वायत्तता अनिवार्य है?","r":"प्रजनन अधिकार: गर्भपात, गोपनीयता, महिला स्वायत्तता; Article 21 संरक्षण।","d":"प्रजनन अधिकार और महिला स्वायत्तता Article 21 के तहत संरक्षित है। गर्भपात, गोपनीयता और महिला निर्णय स्वायत्तता मौलिक अधिकार हैं।"},
  {"s":"S9","n":"Aishat Shifa v. The State of Karnataka","c":"(2023) 2 SCC 1","ctx":"धार्मिक वेशभूषा और शिक्षा","q":"क्या धार्मिक वेशभूषा पहनने का अधिकार शिक्षा संस्थानों में लागू होता है?","i":"क्या धर्मनिरपेक्षता और व्यक्तिगत स्वतंत्रता का संतुलन आवश्यक है?","r":"धार्मिक वेशभूषा और शिक्षा: धर्मनिरपेक्षता, व्यक्तिगत स्वतंत्रता, संस्थागत नियम। संतुलन आवश्यक है।","d":"धार्मिक वेशभूषा और शिक्षा के बीच संतुलन आवश्यक है। धर्मनिरपेक्षता, व्यक्तिगत स्वतंत्रता और संस्थागत नियमों का संतुलन न्यायिक मूल्यांकन का विषय है।"},
  {"s":"S9","n":"Kavita Yadav v. Ministry of Health","c":"2023 SCC OnLine SC 1067","ctx":"सेवाओं में लिंग भेदभाव","q":"क्या सेवाओं में लिंग भेदभाव असंवैधानिक है?","i":"क्या समान वेतन और पदोन्नति अनिवार्य है?","r":"सेवाओं में लिंग भेदभाव असंवैधानिक है। समान वेतन, पदोन्नति और कार्यस्थल सुरक्षा अनिवार्य है।","d":"सेवाओं में लिंग समानता संवैधानिक मूल्य है। समान वेतन, पदोन्नति, कार्यस्थल सुरक्षा और भेदभाव निवारण अनिवार्य है।"},
  {"s":"S9","n":"X v. State (NCT of Delhi)","c":"(2023) 9 SCC 433","ctx":"गर्भपात अधिकार और विवाहेतर संबंध","q":"क्या विवाहेतर संबंधों में महिला को गर्भपात का अधिकार है?","i":"क्या महिला स्वायत्तता और गोपनीयता अनिवार्य है?","r":"गर्भपात अधिकार और विवाहेतर संबंध: MTP Act व्याख्या, महिला स्वायत्तता, गोपनीयता। महिला स्वायत्तता प्राथमिक है।","d":"MTP Act की व्याख्या महिला स्वायत्तता और गोपनीयता को ध्यान में रखकर की जानी चाहिए। विवाहेतर संबंधों में भी महिला को गर्भपात का अधिकार है।"},
  {"s":"S9","n":"State of Jharkhand v. Shailendra Kumar Rai","c":"2022 SCC OnLine SC 1494","ctx":"POCSO मामले, लिंग-संवेदनशीलता","q":"क्या POCSO मामलों में लिंग-संवेदनशील दृष्टिकोण अनिवार्य है?","i":"क्या पीड़िता सम्मान और गोपनीयता अनिवार्य है?","r":"POCSO मामलों में लिंग-संवेदनशीलता: पीड़िता सम्मान, गोपनीयता, विशेष अदालतें। पीड़िता हित प्राथमिक है।","d":"POCSO मामलों में पीड़िता बच्ची का हित प्राथमिक है। लिंग-संवेदनशील दृष्टिकोण, सम्मान, गोपनीयता और विशेष अदालतें अनिवार्य हैं।"},
  {"s":"S9","n":"Deepika Singh v. Central Administrative Tribunal","c":"2022 SCC OnLine SC 1088","ctx":"गैर-पारंपरिक परिवार","q":"क्या गैर-पारंपरिक परिवारों को समान लाभ मिलने चाहिए?","i":"क्या भेदभाव निषेध और सामाजिक वास्तविकता अनिवार्य है?","r":"गैर-पारंपरिक परिवार: समान लाभ, भेदभाव निषेध, सामाजिक वास्तविकता। भेदभाव निषेध अनिवार्य है।","d":"गैर-पारंपरिक परिवार सामाजिक वास्तविकता हैं। समान लाभ, भेदभाव निषेध और सामाजिक स्वीकार्यता अनिवार्य है।"},
  {"s":"S9","n":"Nitisha v. Union of India","c":"(2021) 15 SCC 125","ctx":"सेना में अप्रत्यक्ष भेदभाव","q":"क्या सेना में अप्रत्यक्ष भेदभाव असंवैधानिक है?","i":"क्या मानदंड पुनरीक्षण और लिंग-तटस्थ मूल्यांकन अनिवार्य है?","r":"सेना में अप्रत्यक्ष भेदभाव असंवैधानिक है। मानदंड पुनरीक्षण, लिंग-तटस्थ मूल्यांकन और समान अवसर अनिवार्य है।","d":"सेना में अप्रत्यक्ष भेदभाव लिंग समानता का उल्लंघन है। मानदंड पुनरीक्षण, लिंग-तटस्थ मूल्यांकन और समान अवसर अनिवार्य है।"},
  {"s":"S9","n":"Aparna Bhat v. State of MP","c":"2021 SCC OnLine 230","ctx":"जमानत शर्तों में लिंग-संवेदनशीलता","q":"क्या जमानत शर्तों में लिंग-संवेदनशीलता अनिवार्य है?","i":"क्या अपमानजनक या रूढ़िवादी शर्तें अस्वीकार्य हैं?","r":"जमानत शर्तों में लिंग-संवेदनशीलता: पीड़िता से संपर्क निषेध, अपमानजनक शर्तें अस्वीकार्य। 'Handbook on Combating Gender Stereotypes' का अनुपालन अनिवार्य है।","d":"जमानत शर्तें तटस्थ, वैज्ञानिक और गरिमापूर्ण होनी चाहिए। पीड़िता से संपर्क निषेध और अपमानजनक शर्तें अस्वीकार्य हैं।"},
  {"s":"S9","n":"Patan Jamal Vali v. State of A.P.","c":"2021 SCC OnLine SC 343","ctx":"पीड़िता-केंद्रित दृष्टिकोण","q":"क्या यौन अपराधों में पीड़िता-केंद्रित दृष्टिकोण अनिवार्य है?","i":"क्या पीड़िता गरिमा और गोपनीयता अनिवार्य है?","r":"यौन अपराधों में पीड़िता-केंद्रित दृष्टिकोण: गरिमा, गोपनीयता, सम्मानपूर्ण व्यवहार। पीड़िता हित प्राथमिक है।","d":"यौन अपराधों में पीड़िता-केंद्रित दृष्टिकोण अनिवार्य है। गरिमा, गोपनीयता, सम्मानपूर्ण व्यवहार और 'Handbook' का अनुपालन अनिवार्य है।"},
  {"s":"S9","n":"Secretary Ministry of Defence v. Babita Puniya","c":"(2020) 7 SCC 469","ctx":"महिला अधिकारियों के लिए स्थायी आयोग","q":"क्या सशस्त्र बलों में महिला अधिकारियों को स्थायी आयोग का अधिकार है?","i":"क्या कमांड पोस्टिंग में भेदभाव असंवैधानिक है?","r":"महिला अधिकारियों को पुरुष समकक्षों के समान Permanent Commission का अधिकार; कमांड पोस्टिंग में भेदभाव असंवैधानिक; सशस्त्र बलों में लिंग समानता।","d":"सशस्त्र बलों में लिंग समानता संवैधानिक मूल्य है। महिला अधिकारियों को स्थायी आयोग, समान पदोन्नति और कमांड पोस्टिंग का अधिकार है। भेदभाव असंवैधानिक है।"},
  {"s":"S9","n":"Union of India v. Annie Nagaraja","c":"(2020) 13 SCC 1","ctx":"रक्षा सेवाओं में महिलाओं के अधिकार","q":"क्या रक्षा सेवाओं में महिलाओं को समान अधिकार मिलने चाहिए?","i":"क्या कार्यस्थल सुरक्षा और भेदभाव निवारण अनिवार्य है?","r":"रक्षा सेवाओं में महिलाओं के अधिकार: समान पदोन्नति, कार्यस्थल सुरक्षा, भेदभाव निवारण। लिंग समानता अनिवार्य है।","d":"रक्षा सेवाओं में लिंग समानता संवैधानिक मूल्य है। समान पदोन्नति, कार्यस्थल सुरक्षा और भेदभाव निवारण अनिवार्य है।"},
  {"s":"S9","n":"Indian Young Lawyers Association v. The State of Kerala (Sabarimala)","c":"(2019) 11 SCC 1","ctx":"महिलाओं का मंदिर प्रवेश","q":"क्या धार्मिक प्रथाएँ मौलिक अधिकारों के अधीन हैं?","i":"क्या महिलाओं के मंदिर प्रवेश पर प्रतिबंध असंवैधानिक है?","r":"10-50 वर्ष की महिलाओं के प्रवेश पर प्रतिबंध असंवैधानिक; धार्मिक प्रथाएँ मौलिक अधिकारों के अधीन।","d":"धार्मिक प्रथाएँ मौलिक अधिकारों के अधीन हैं। महिलाओं के मंदिर प्रवेश पर प्रतिबंध लिंग भेदभाव और गरिमा का उल्लंघन है। समानता, धार्मिक स्वतंत्रता और गरिमा का संतुलन आवश्यक है।"},
  {"s":"S9","n":"Joseph Shine v. Union of India","c":"(2019) 3 SCC 39","ctx":"व्यभिचार का अपराधीकरण","q":"क्या Section 497 IPC Article 14, 15 और 21 का उल्लंघन करता है?","i":"क्या व्यभिचार को केवल पुरुष के विरुद्ध अपराध मानना लैंगिक भेदभाव है?","r":"Section 497 IPC असंवैधानिक है। यह महिलाओं को पुरुष की 'संपत्ति' मानता है और लैंगिक समानता का उल्लंघन है। व्यभिचार अब केवल तलाक का नागरिक आधार है।","d":"5 जजों की पीठ ने ऐतिहासिक निर्णय देते हुए कहा कि विवाह संस्था पुरुष प्रधान नहीं हो सकती। Section 497 केवल पुरुष को दंडित करता था और पत्नी को 'शिकायतकर्ता' या 'साजिशकर्ता' मानता था, जो Article 14 और 15 के विरुद्ध है। न्यायालय ने 'Sexual Autonomy' और 'Privacy' को Article 21 का अभिन्न अंग माना।"},
  {"s":"S9","n":"Rampal v. State of Haryana","c":"2019 SCC OnLine SC 1993","ctx":"ऑनर किलिंग","q":"क्या ऑनर किलिंग गंभीर अपराध है?","i":"क्या राज्य जिम्मेदारी और पीड़िता संरक्षण अनिवार्य है?","r":"ऑनर किलिंग: गंभीर अपराध, राज्य जिम्मेदारी, पीड़िता संरक्षण। राज्य जिम्मेदारी निरपेक्ष है।","d":"ऑनर किलिंग मानवाधिकारों का गंभीर उल्लंघन है। राज्य को पीड़िता संरक्षण, जांच और दंड सुनिश्चित करना चाहिए। निरपेक्ष जिम्मेदारी लागू होती है।"},
  {"s":"S9","n":"Nipun Saxena v. Union of India","c":"(2019) 2 SCC 703","ctx":"पीड़िता पहचान संरक्षण","q":"क्या पीड़िता पहचान गोपनीय रखी जानी चाहिए?","i":"क्या निर्णय, मीडिया और रिकॉर्ड में पहचान उजागर करना अमान्य है?","r":"यौन अपराध पीड़िता की पहचान गोपनीय रखना; निर्णय, मीडिया, रिकॉर्ड में सुरक्षा। पीड़िता गोपनीयता अनिवार्य है।","d":"यौन अपराध पीड़िता की पहचान पूर्णतः गोपनीय रखी जानी चाहिए। निर्णय में भी गुमनाम पहचान (Initials/Alias) का उपयोग अनिवार्य है। मीडिया और रिकॉर्ड में भी सुरक्षा अनिवार्य है।"},
  {"s":"S9","n":"Shakti Vahini v. Union of India","c":"(2018) 7 SCC 192","ctx":"ऑनर क्राइम रोकथाम","q":"क्या ऑनर क्राइम रोकथाम के लिए विशेष उपाय आवश्यक हैं?","i":"क्या निवारक उपाय और संरक्षण अनिवार्य है?","r":"ऑनर क्राइम रोकथाम: निवारक उपाय, संरक्षण, कानून प्रवर्तन। राज्य जिम्मेदारी निरपेक्ष है।","d":"ऑनर क्राइम मानवाधिकारों का गंभीर उल्लंघन है। निवारक उपाय, पीड़िता संरक्षण और कानून प्रवर्तन अनिवार्य है। राज्य निरपेक्ष जिम्मेदार है।"},
  {"s":"S9","n":"Shafin Jahan v. Asokan K.M.","c":"(2018) 16 SCC 368","ctx":"साथी चुनने का अधिकार","q":"क्या वयस्क महिला का साथी चुनने का अधिकार मौलिक अधिकार है?","i":"क्या धर्म परिवर्तन और विवाह व्यक्तिगत स्वायत्तता के अधीन हैं?","r":"वयस्क महिला का साथी चुनने का अधिकार; Article 21 व्यक्तिगत स्वायत्तता; धर्म परिवर्तन और विवाह। व्यक्तिगत स्वायत्तता प्राथमिक है।","d":"वयस्क महिला का साथी चुनने का अधिकार Article 21 के तहत संरक्षित है। धर्म परिवर्तन और विवाह व्यक्तिगत स्वायत्तता के अधीन हैं। राज्य या परिवार हस्तक्षेप नहीं कर सकता।"},
  {"s":"S9","n":"Nandakumar v. State of Kerala","c":"(2018) 16 SCC 602","ctx":"लिव-इन रिलेशनशिप","q":"क्या लिव-इन रिलेशनशिप को कानूनी मान्यता मिलनी चाहिए?","i":"क्या संरक्षण और सामाजिक स्वीकार्यता अनिवार्य है?","r":"लिव-इन रिलेशनशिप: कानूनी मान्यता, संरक्षण, सामाजिक स्वीकार्यता। व्यक्तिगत स्वायत्तता प्राथमिक है।","d":"लिव-इन रिलेशनशिप व्यक्तिगत स्वायत्तता का हिस्सा है। कानूनी मान्यता, संरक्षण और सामाजिक स्वीकार्यता अनिवार्य है। भेदभाव असंवैधानिक है।"},
  {"s":"S9","n":"Shayara Bano v. Union of India","c":"(2017) 9 SCC 1","ctx":"त्रिविवाह असंवैधानिक","q":"क्या त्रिविवाह असंवैधानिक है?","i":"क्या Article 14 और 25 का उल्लंघन होता है?","r":"Instant Triple Talaq असंवैधानिक (3:2); Article 14 और 25 के विरुद्ध; मनमाना और अत्यधिक; मुस्लिम महिलाओं के विवाह अधिकारों की रक्षा।","d":"त्रिविवाह मुस्लिम महिलाओं के विवाह अधिकारों का उल्लंघन है। यह मनमाना, अत्यधिक और असंवैधानिक है। मुस्लिम महिलाओं के विवाह अधिकारों की रक्षा अनिवार्य है।"},
  {"s":"S9","n":"X v. Union of India","c":"(2017) 3 SCC 458","ctx":"HIV और भेदभाव","q":"क्या HIV पॉजिटिव व्यक्तियों के अधिकार संरक्षित हैं?","i":"क्या भेदभाव निषेध और गोपनीयता अनिवार्य है?","r":"HIV पॉजिटिव व्यक्तियों के अधिकार: भेदभाव निषेध, गोपनीयता, स्वास्थ्य सेवा। भेदभाव निषेध अनिवार्य है।","d":"HIV पॉजिटिव व्यक्तियों के अधिकार संवैधानिक संरक्षण प्राप्त हैं। भेदभाव निषेध, गोपनीयता और स्वास्थ्य सेवा अनिवार्य है।"},
  {"s":"S9","n":"Independent Thought v. Union of India","c":"(2017) 10 SCC 800","ctx":"बाल विवाह और बलात्कार","q":"क्या 18 वर्ष से कम पत्नी के साथ यौन संबंध बलात्कार है?","i":"क्या Section 375 IPC का अपवाद असंवैधानिक है?","r":"18 वर्ष से कम पत्नी के साथ यौन संबंध बलात्कार; Exception to Section 375 IPC असंवैधानिक; बालिका संरक्षण।","d":"18 वर्ष से कम बालिका के साथ यौन संबंध बलात्कार है, चाहे वह विवाहित ही क्यों न हो। बालिका संरक्षण प्राथमिक है और धारा 375 का अपवाद असंवैधानिक है।"},
  {"s":"S9","n":"Charu Khurana v. Union of India","c":"(2015) 1 SCC 192","ctx":"पेशेवर क्षेत्र में लिंग समानता","q":"क्या पेशेवर क्षेत्र में लिंग भेदभाव असंवैधानिक है?","i":"क्या समान अवसर और कार्यस्थल सुरक्षा अनिवार्य है?","r":"पेशेवर क्षेत्र में लिंग समानता: भेदभाव निषेध, समान अवसर, कार्यस्थल सुरक्षा। लिंग समानता अनिवार्य है।","d":"पेशेवर क्षेत्र में लिंग समानता संवैधानिक मूल्य है। भेदभाव निषेध, समान अवसर और कार्यस्थल सुरक्षा अनिवार्य है।"},
  {"s":"S9","n":"Laxmi v. Union of India","c":"(2014) 4 SCC 427","ctx":"एसिड अटैक पीड़िताओं के अधिकार","q":"क्या एसिड अटैक पीड़िताओं को विशेष संरक्षण और मुआवजा मिलना चाहिए?","i":"क्या चिकित्सा सहायता और पुनर्वास अनिवार्य है?","r":"एसिड अटैक पीड़िताओं के अधिकार: मुआवजा, चिकित्सा सहायता, पुनर्वास। राज्य जिम्मेदारी निरपेक्ष है।","d":"एसिड अटैक पीड़िताओं के अधिकार संवैधानिक संरक्षण प्राप्त हैं। मुआवजा, चिकित्सा सहायता, पुनर्वास और राज्य निरपेक्ष जिम्मेदारी अनिवार्य है।"},
  {"s":"S9","n":"Ankush Gaikwad v. State of Maharashtra","c":"(2013) 6 SCC 770","ctx":"मृत्युदंड और लिंग","q":"क्या मृत्युदंड में लिंग भेदभाव असंवैधानिक है?","i":"क्या समान न्याय और दंड सिद्धांत अनिवार्य है?","r":"मृत्युदंड और लिंग: भेदभाव निषेध, समान न्याय, दंड सिद्धांत। समान न्याय अनिवार्य है।","d":"मृत्युदंड में लिंग भेदभाव असंवैधानिक है। समान न्याय, दंड सिद्धांत और भेदभाव निषेध अनिवार्य है।"},

  {"s":"S10","n":"Ravinder Kumar Dhariwal v. Union of India","c":"(2023) 2 SCC 209","ctx":"सरकारी नौकरियों में आरक्षण","q":"क्या सरकारी नौकरियों में विकलांगों के लिए आरक्षण अनिवार्य है?","i":"क्या समायोजन और कार्यान्वयन अनिवार्य है?","r":"सरकारी नौकरियों में विकलांगों के लिए आरक्षण: RPwD Act, 2016, समायोजन, कार्यान्वयन। आरक्षण अनिवार्य है।","d":"RPwD Act, 2016 के तहत सरकारी नौकरियों में विकलांगों के लिए आरक्षण अनिवार्य है। समायोजन, कार्यान्वयन और निगरानी राज्य का कर्तव्य है।"},
  {"s":"S10","n":"Prakash Nayi v. State of Goa","c":"(2023) 5 SCC 673","ctx":"सुलभ बुनियादी ढाँचा","q":"क्या सुलभ बुनियादी ढाँचा मौलिक अधिकार है?","i":"क्या सार्वजनिक स्थान और न्यायालय सुलभ होने चाहिए?","r":"सुलभ बुनियादी ढाँचा: सार्वजनिक स्थान, परिवहन, न्यायालय; Article 14, 21। सुलभता अनिवार्य है।","d":"सुलभ बुनियादी ढाँचा मौलिक अधिकार है। सार्वजनिक स्थान, परिवहन और न्यायालय विकलांग-अनुकूल होने चाहिए।"},
  {"s":"S10","n":"Smruti Tukaram Badade v. State of Maharashtra","c":"(2022) 18 SCC 24","ctx":"आपराधिक न्याय में विकलांग","q":"क्या आपराधिक न्याय में विकलांगों के लिए समायोजन अनिवार्य है?","i":"क्या सहायता और निष्पक्ष सुनवाई अनिवार्य है?","r":"आपराधिक न्याय में विकलांग: समायोजन, सहायता, निष्पक्ष सुनवाई। निष्पक्ष सुनवाई अनिवार्य है।","d":"आपराधिक न्याय में विकलांगों के लिए समायोजन, सहायता और निष्पक्ष सुनवाई अनिवार्य है। विशेष व्यवस्था और सहायता प्रदान करना राज्य का कर्तव्य है।"},
  {"s":"S10","n":"Vikash Kumar v. UPSC","c":"(2021) 5 SCC 370","ctx":"Reasonable Accommodation","q":"क्या परीक्षाओं में अतिरिक्त समय और सहायक उपकरण प्रदान करना राज्य का कर्तव्य है?","i":"क्या विकलांगता के आधार पर परीक्षा में असमान स्थिति Article 14 का उल्लंघन है?","r":"हाँ, Reasonable Accommodation मौलिक अधिकार है। परीक्षा में अतिरिक्त समय, सहायक उपकरण; RPwD Act, 2016 और Article 14, 21 के तहत सार्वभौमिक पहुँच।","d":"इस निर्णय ने 'Substantive Equality' की अवधारणा को सुदृढ़ किया। न्यायालय ने कहा कि विकलांग व्यक्ति को केवल 'समान अवसर' नहीं, बल्कि 'समान परिणाम' प्राप्त करने के लिए समायोजन की आवश्यकता होती है।"},
  {"s":"S10","n":"Patan Jamal Vali v. State of A.P.","c":"2021 SCC OnLine SC 343","ctx":"विकलांग पीड़िताओं के अधिकार","q":"क्या विकलांग पीड़िताओं को विशेष संरक्षण और सहायता मिलनी चाहिए?","i":"क्या लिंग-संवेदनशीलता और संरक्षण अनिवार्य है?","r":"विकलांग पीड़िताओं के अधिकार: संरक्षण, सहायता, लिंग-संवेदनशीलता। विशेष संरक्षण अनिवार्य है।","d":"विकलांग पीड़िताओं को विशेष संरक्षण, सहायता और लिंग-संवेदनशील दृष्टिकोण की आवश्यकता है। विशेष व्यवस्था और संरक्षण अनिवार्य है।"},
  {"s":"S10","n":"Accused 'X' v State of Maharashtra","c":"2019(6) SCR 1","ctx":"मानसिक स्वास्थ्य और मुकदमा","q":"क्या मानसिक स्वास्थ्य स्थिति में मुकदमा स्थगित किया जा सकता है?","i":"क्या क्षमता मूल्यांकन और उपचार अनिवार्य है?","r":"मानसिक स्वास्थ्य और मुकदमा: क्षमता मूल्यांकन, उपचार, निष्पक्ष सुनवाई। निष्पक्ष सुनवाई अनिवार्य है।","d":"मानसिक स्वास्थ्य स्थिति में मुकदमा प्रक्रिया विशेष संवेदनशीलता के साथ होनी चाहिए। क्षमता मूल्यांकन, उपचार और निष्पक्ष सुनवाई अनिवार्य है।"},

// 🔹 UI लॉजिक
const tbody = document.getElementById('tbody');
const search = document.getElementById('search');
const filters = document.querySelectorAll('.fb');
let currentFilter = 'all';

function render() {
  const term = search.value.toLowerCase();
  tbody.innerHTML = '';
  const filtered = cases.filter(c => 
    (currentFilter === 'all' || c.s === currentFilter) &&
    (c.n.toLowerCase().includes(term) || c.ctx.toLowerCase().includes(term) || c.b?.toLowerCase().includes(term) || c.c.toLowerCase().includes(term))
  );
  filtered.forEach(c => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><span class="session-tag">${c.s.replace('S','Session ')}</span></td><td style="font-weight:600">${c.n}</td><td style="color:var(--muted);font-size:.85rem">${c.c}</td><td>${c.ctx}</td>`;    tr.onclick = () => showModal(c);
    tbody.appendChild(tr);
  });
  if(!filtered.length) tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--muted)">कोई केस नहीं मिला</td></tr>`;
}

function showModal(c) {
  document.getElementById('mt').textContent = c.n;
  document.getElementById('mc').textContent = c.c;
  document.getElementById('mx').textContent = c.ctx;
  document.getElementById('mq').textContent = c.q || 'N/A';
  document.getElementById('mi').textContent = c.i || 'N/A';
  document.getElementById('mr').textContent = c.r;
  document.getElementById('ma').textContent = c.d;
  document.getElementById('modal').style.display = 'flex';
}

document.querySelector('.cl').onclick = () => document.getElementById('modal').style.display = 'none';
document.getElementById('modal').onclick = e => { if(e.target.id==='modal') document.getElementById('modal').style.display='none'; };
document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('modal').style.display='none'; });
search.addEventListener('input', render);
filters.forEach(b => {
  b.onclick = () => {
    filters.forEach(f => f.classList.remove('act'));
    b.classList.add('act');
    currentFilter = b.dataset.s;
    render();
  };
});
render();
</script>
